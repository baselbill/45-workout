<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0f1117">
<title>Strength Program — Bill Zhou</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surf:#1a1d26;--surf2:#22263a;--surf3:#2a2e42;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0f0f0;--muted:#7a7f96;--accent:#4ade80;--accent-dim:rgba(74,222,128,0.12);--amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);--blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);--red:#f87171;--red-dim:rgba(248,113,113,0.12);--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);--r:12px;--r-sm:8px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
#main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 110px;-webkit-overflow-scrolling:touch}
#main::-webkit-scrollbar{display:none}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--surf);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:.03em;transition:color .15s}
.nav-item svg{width:22px;height:22px}
.nav-item.active{color:var(--accent)}
.screen{display:none;padding-top:16px}.screen.active{display:block}
.page-title{font-size:22px;font-weight:600;color:var(--text)}
.page-sub{font-size:13px;color:var(--muted);margin-top:3px}
.page-header{padding:8px 0 16px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;font-family:var(--mono)}
.badge-green{background:var(--accent-dim);color:var(--accent)}
.badge-amber{background:var(--amber-dim);color:var(--amber)}
.badge-blue{background:var(--blue-dim);color:var(--blue)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-purple{background:var(--purple-dim);color:var(--purple)}
.btn{display:block;width:100%;padding:13px;font-size:14px;font-weight:500;font-family:var(--sans);border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;text-align:center;transition:all .15s;margin-bottom:8px}
.btn:active{transform:scale(.98);opacity:.8}
.btn-primary{background:var(--accent);color:#0a1a0f;border-color:var(--accent);font-weight:600}
.btn-sm{width:auto;display:inline-flex;align-items:center;gap:4px;padding:7px 12px;font-size:12px;margin-bottom:0}
.btn-ghost{border-color:transparent;color:var(--muted)}
.btn-danger{border-color:var(--red);color:var(--red)}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.prog-track{height:4px;background:var(--surf2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.section-label{font-size:10px;font-family:var(--mono);font-weight:500;color:var(--muted);letter-spacing:.1em;margin:16px 0 8px;text-transform:uppercase}
.divider{height:1px;background:var(--border);margin:12px 0}
.alert{border-radius:var(--r-sm);padding:10px 12px;font-size:12px;line-height:1.6;margin-bottom:10px}
.alert-amber{background:var(--amber-dim);color:var(--amber)}
.alert-blue{background:var(--blue-dim);color:var(--blue)}
.alert-green{background:var(--accent-dim);color:var(--accent)}
.alert-red{background:var(--red-dim);color:var(--red)}
.alert-purple{background:var(--purple-dim);color:var(--purple)}
/* Exercise cards — clean, no mod colouring */
.ex-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.ex-card.done{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
.ex-name{font-size:14px;font-weight:500;color:var(--text)}
.ex-detail{font-size:12px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.ex-note{font-size:12px;color:var(--muted);background:var(--surf2);border-radius:var(--r-sm);padding:8px 10px;margin:8px 0;line-height:1.5}
.ex-rec{font-size:12px;color:var(--accent);background:var(--accent-dim);border-radius:var(--r-sm);padding:7px 10px;margin:6px 0;display:flex;align-items:center;gap:6px}
.ss-badge{font-size:10px;font-family:var(--mono);background:var(--blue-dim);color:var(--blue);border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle}
.help-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);flex-shrink:0;margin-left:6px;vertical-align:middle}
/* Set logging */
.sets-area{margin-top:10px}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.set-label{font-size:11px;font-family:var(--mono);color:var(--muted);width:38px;flex-shrink:0}
.set-input{flex:1;padding:8px 6px;font-size:14px;font-family:var(--mono);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);text-align:center;min-width:0;-webkit-appearance:none}
.set-input:focus{outline:none;border-color:var(--border2)}
.set-input::placeholder{color:var(--muted);font-size:11px}
.set-input.on-target{border-color:rgba(74,222,128,.5)}
.set-input.off-target{border-color:rgba(248,113,113,.4)}
.set-check{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted);transition:all .15s;font-size:16px}
.set-check.done{background:var(--accent);border-color:var(--accent);color:#0a1a0f}
.timer-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--muted)}
/* Timer */
.timer-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:10px 0;text-align:center}
.timer-display{font-size:44px;font-weight:300;font-family:var(--mono);color:var(--text);letter-spacing:-2px;margin:8px 0}
.timer-display.done{color:var(--accent)}
.timer-display.warn{color:var(--amber)}
.timer-btns{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
/* Warmup */
.warmup-box{background:var(--surf2);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px}
.warmup-label{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.08em;margin-bottom:4px}
.warmup-text{font-size:12px;color:var(--text);line-height:1.6}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:10px 0}
.cal-hdr{text-align:center;font-size:10px;font-family:var(--mono);color:var(--muted);padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono);color:var(--muted);background:transparent;cursor:default;position:relative}
.cal-day.has-workout{background:var(--surf2);color:var(--text);cursor:pointer}
.cal-day.completed{background:rgba(74,222,128,.15);color:var(--accent)}
.cal-day.today-workout{background:var(--accent);color:#0a1a0f;font-weight:600}
.cal-day.today-rest{border:1px solid var(--border2);color:var(--muted)}
.cal-day.missed{background:rgba(248,113,113,.15);color:var(--red)}
.cal-day.future{opacity:.4}
.cal-dot{width:4px;height:4px;border-radius:50%;background:currentColor;position:absolute;bottom:3px}
/* Week grid */
.week-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0}
.week-cell{aspect-ratio:1;border-radius:var(--r-sm);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--muted);background:var(--surf)}
.week-cell .wn{font-size:14px;font-weight:600;font-family:var(--mono)}
.week-cell.current{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.week-cell.done{border-color:rgba(74,222,128,.3);color:var(--accent);background:rgba(74,222,128,.06)}
.week-cell.deload{border-color:rgba(96,165,250,.3);color:var(--blue);background:var(--blue-dim)}
/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-num{font-size:26px;font-weight:600;font-family:var(--mono);color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
/* Bar chart */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-label{font-size:10px;font-family:var(--mono);color:var(--muted);width:42px;text-align:right;flex-shrink:0}
.bar-outer{flex:1;height:14px;background:var(--surf2);border-radius:3px;overflow:hidden}
.bar-inner{height:100%;background:var(--accent);border-radius:3px;transition:width .5s ease}
.bar-val{font-size:10px;font-family:var(--mono);color:var(--muted);width:24px;flex-shrink:0}
/* Phase tabs */
.phase-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--muted);background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.phase-tab.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(74,222,128,.3)}
/* 1RM */
.rm-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.rm-lift-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px}
.rm-inputs{display:flex;gap:8px;margin-bottom:10px}
.rm-input-wrap{flex:1;display:flex;flex-direction:column;gap:4px}
.rm-input-label{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.rm-input{width:100%;padding:9px 10px;font-size:15px;font-family:var(--mono);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);text-align:center;-webkit-appearance:none}
.rm-input:focus{outline:none;border-color:var(--border2)}
.rm-result{background:var(--accent-dim);border-radius:var(--r-sm);padding:10px 12px}
.rm-1rm{font-size:22px;font-weight:600;font-family:var(--mono);color:var(--accent)}
.rm-history{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
/* Mobility checklist */
.mob-check-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;transition:all .2s}
.mob-check-card.checked{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
.mob-check-row{display:flex;align-items:center;gap:12px;cursor:pointer}
.mob-checkbox{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:14px}
.mob-check-card.checked .mob-checkbox{background:var(--accent);border-color:var(--accent);color:#0a1a0f}
.mob-check-name{font-size:14px;font-weight:500;color:var(--text);flex:1}
.mob-check-meta{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:2px}
.mob-check-card.checked .mob-check-name{color:var(--accent)}
.mob-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.mob-check-card.expanded .mob-detail{display:block}
.mob-steps{list-style:none;counter-reset:step}
.mob-steps li{counter-increment:step;display:flex;gap:8px;margin-bottom:8px;font-size:12px;color:var(--muted);line-height:1.5}
.mob-steps li::before{content:counter(step);width:18px;height:18px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);color:var(--accent);flex-shrink:0;margin-top:1px}
.mob-ring{width:56px;height:56px;flex-shrink:0}
/* Reference panel (slide-up) */
.ref-panel{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(0,0,0,.7);opacity:0;pointer-events:none;transition:opacity .2s}
.ref-panel.open{opacity:1;pointer-events:all}
.ref-inner{background:var(--surf);border-radius:var(--r) var(--r) 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease}
.ref-panel.open .ref-inner{transform:translateY(0)}
.ref-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px}
.ref-detail{font-size:12px;font-family:var(--mono);color:var(--muted);margin-bottom:14px}
.ref-section{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 8px}
.ref-steps{list-style:none;counter-reset:rs}
.ref-steps li{counter-increment:rs;display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:var(--text);line-height:1.6}
.ref-steps li::before{content:counter(rs);width:22px;height:22px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono);color:var(--accent);flex-shrink:0;margin-top:2px}
.ref-cue{background:var(--surf2);border-radius:var(--r-sm);padding:10px 12px;font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.6}
.ref-mistake{background:var(--red-dim);border-radius:var(--r-sm);padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:8px;line-height:1.5}
.ref-link{display:flex;align-items:center;gap:8px;background:var(--blue-dim);border-radius:var(--r-sm);padding:10px 12px;font-size:13px;color:var(--blue);text-decoration:none;margin-bottom:8px}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surf);border-radius:var(--r) var(--r) 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;color:var(--text)}
input[type=date],input[type=number],input[type=text]{font-family:var(--mono);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);padding:10px 12px;font-size:14px;width:100%}
input[type=date]:focus,input[type=number]:focus{outline:none;border-color:var(--border2)}
input[type=date]{color-scheme:dark}
.complete-btn{background:var(--accent);color:#0a1a0f;border:none;border-radius:var(--r-sm);padding:15px;font-size:15px;font-weight:600;font-family:var(--sans);width:100%;cursor:pointer;margin-top:14px}
.complete-btn:active{transform:scale(.98)}
.missed-banner{background:var(--red-dim);border:1px solid rgba(248,113,113,.3);border-radius:var(--r);padding:14px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="screen-today" class="screen active"></div>
    <div id="screen-calendar" class="screen"></div>
    <div id="screen-strength" class="screen"></div>
    <div id="screen-progress" class="screen"></div>
    <div id="screen-mobility" class="screen"></div>
  </div>
  <nav id="nav">
    <button class="nav-item active" onclick="showScreen('today',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Today
    </button>
    <button class="nav-item" onclick="showScreen('calendar',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar
    </button>
    <button class="nav-item" onclick="showScreen('strength',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4M6 9h12M6 15h12"/></svg>1RM
    </button>
    <button class="nav-item" onclick="showScreen('progress',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Progress
    </button>
    <button class="nav-item" onclick="showScreen('mobility',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>Mobility
    </button>
  </nav>
</div>

<!-- Exercise reference panel -->
<div id="ref-panel" class="ref-panel" onclick="if(event.target===this)closeRef()">
  <div class="ref-inner" id="ref-inner"></div>
</div>

<!-- Modals -->
<div id="modal-setup" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">Set up your program</div>
    <div style="margin-bottom:12px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Program start date</div>
      <input type="date" id="setup-date" style="margin-bottom:12px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Training days (pick 3)</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px" id="day-picker"></div>
    </div>
    <button class="btn btn-primary" onclick="saveSetup()">Start program</button>
  </div>
</div>

<div id="modal-bw" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-bw')">
  <div class="modal">
    <div class="modal-title">Log bodyweight</div>
    <div style="margin-bottom:12px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Weight (kg)</div>
      <input type="number" id="bw-input" placeholder="e.g. 82.5" step="0.1" inputmode="decimal">
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Date</div>
      <input type="date" id="bw-date">
    </div>
    <button class="btn btn-primary" onclick="saveBW()">Save</button>
    <button class="btn btn-ghost" onclick="closeModal('modal-bw')">Cancel</button>
  </div>
</div>

<div id="modal-missed" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">Missed workouts</div>
    <div id="modal-missed-body"></div>
    <button class="btn btn-primary" onclick="slideProgramForward()">Slide program forward</button>
    <button class="btn btn-ghost" onclick="closeModal('modal-missed')">Dismiss</button>
  </div>
</div>

<div id="week-picker-modal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-title">Jump to session</div>
    <div id="week-picker-grid" class="week-grid"></div>
    <button class="btn btn-ghost" onclick="document.getElementById('week-picker-modal').classList.remove('open')">Cancel</button>
  </div>
</div>

<script>
// ─── EXERCISE REFERENCE DATA ────────────────────────────────────────────────
const EXREF = {
  "Plank Shoulder Taps":{sets:"2 sets · 14 reps total",steps:["Start in a high plank with hands directly under shoulders, feet hip-width apart.","Brace your core hard — imagine bracing for a punch.","Lift your right hand and tap your left shoulder, keeping your hips completely still.","Return your hand, then repeat on the other side. That's 2 reps.","Move slowly. The challenge is stopping your hips from rotating."],cue:"Squeeze your glutes and brace your abs before every tap. Slow = harder.",mistake:"Letting your hips rock side to side. If they move, widen your feet.",search:"plank shoulder taps"},
  "Banded Serratus Press":{sets:"2 sets · 10 reps",steps:["Anchor a resistance band behind you at shoulder height.","Hold the band with both hands, elbows straight, hands slightly wider than shoulders.","Press forward (away from the anchor), driving your shoulder blades apart.","At full extension, push your arms even further forward — protract the shoulder blades.","Return slowly. Elbows stay straight the entire time."],cue:"Think of reaching forward beyond your hands at the top. That's what activates the serratus.",mistake:"Bending the elbows. This is not a press in the traditional sense — arms stay locked.",search:"banded serratus press exercise"},
  "Cable Rope Face Pull":{sets:"2–3 sets · 12–15 reps",steps:["Set the cable pulley at or just above eye level. Attach a rope handle.","Grip the rope with thumbs pointing toward you. Take 2 steps back.","Stand tall. Pull the rope toward your face, splitting your hands apart as you pull.","At the end position, your elbows should be above shoulder height, forearms vertical.","Pause 1 second, then return slowly under control."],cue:"Lead with your elbows, not your hands. Elbows must finish above shoulder height.",mistake:"Swaying backward to pull more weight. Zero body movement — this is a shoulder health exercise.",search:"cable rope face pull form"},
  "Barbell Bench Press":{sets:"4–5 sets · 5–8 reps",steps:["Lie flat on the bench. Eyes under the bar. Feet flat on the floor.","Grip the bar just outside shoulder width. Squeeze the bar hard.","Unrack and hold the bar over your chest with straight arms.","Lower the bar to your mid-chest in a controlled arc — 2–3 seconds down.","Press back up to lockout, driving your feet into the floor."],cue:"Imagine trying to bend the bar into a U shape. This activates your lats and keeps shoulders safe.",mistake:"Flaring elbows out 90°. Keep them at roughly 45–60° from your torso.",search:"barbell bench press proper form"},
  "Single Arm Cable Row":{sets:"3 sets · 10 reps/side",steps:["Set the pulley at chest height. Stand or sit facing the cable.","Grab the handle with one hand. Step back until there's full tension.","Reach forward fully — let the shoulder blade slide forward (this is the stretch).","Pull the handle back to your hip, driving your elbow behind your body.","Squeeze your shoulder blade back and down at the end. Pause 1 second."],cue:"Initiate every rep by pulling your shoulder blade back first, then bend the elbow.",mistake:"Twisting your torso to pull more weight. Square hips and shoulders throughout.",search:"single arm cable row technique"},
  "DB Incline Bench Press":{sets:"3 sets · 10 reps",steps:["Set bench to 30–45°. Sit and place dumbbells on your thighs.","Kick them up to chest height as you lie back.","Hold dumbbells at chest level, elbows at about 60° from your torso.","Press up and slightly inward until arms are straight.","Lower slowly — 3 seconds — feeling the chest stretch at the bottom."],cue:"The eccentric (lowering) phase builds more strength than the press. Don't let gravity do it.",mistake:"Setting the bench too steep (above 45°) — this shifts the load to your front delts, not chest.",search:"dumbbell incline bench press form"},
  "Dip":{sets:"3–4 sets · 6–12 reps",steps:["Grip parallel bars and support your full bodyweight. Arms locked.","Lean forward slightly to bias the chest (or stay upright for triceps).","Lower yourself by bending your elbows until your upper arms are at or below parallel.","Press back up to lockout. Pause briefly at the top."],cue:"Control the descent — 2 seconds down. Don't bounce out of the bottom.",mistake:"Not going deep enough. Upper arms must reach parallel to get the full benefit.",search:"dip exercise proper form"},
  "Banded Dead-Bug":{sets:"2 sets · 16 reps total",steps:["Lie on your back. Hold a band anchored overhead with both hands. Arms straight up.","Bend knees to 90°, shins parallel to the floor.","Press your lower back HARD into the floor. Hold this throughout.","Slowly lower your right leg until it's nearly straight, hovering above the floor.","Return the leg, then repeat on the left. Lower back must not lift off."],cue:"The moment your lower back lifts, the exercise is over. Stop there and reset.",mistake:"Moving too fast. The challenge is the core controlling the movement, not the legs.",search:"banded dead bug core exercise"},
  "Single Leg Glute Bridge":{sets:"2 sets · 10 reps/side",steps:["Lie on your back, knees bent, feet flat on the floor hip-width apart.","Extend one leg straight, keeping thighs parallel.","Press through the heel of the planted foot and drive your hips to the ceiling.","At the top, squeeze your glute hard for 1–2 seconds. Hips level — don't let one side drop.","Lower with control. Complete all reps on one side, then switch."],cue:"Imagine pushing the floor away from you rather than lifting your hips up.",mistake:"Letting the extended-leg side of your hip drop. Watch for level hips at the top.",search:"single leg glute bridge exercise"},
  "Barbell Back Squat":{sets:"3–4 sets · 5–8 reps",steps:["Bar across your upper traps. Feet shoulder-width, toes turned out 15–30°.","Take a big breath into your belly and brace your core hard (Valsalva maneuver).","Initiate by pushing your knees out and sitting back and down simultaneously.","Descend until hips are at or below parallel with knees.","Drive through your full foot — not just your heels — to stand."],cue:"Knees should track over your pinky toe the entire way down and up.",mistake:"Knees caving inward on the way up. Push your knees out actively on the ascent.",search:"barbell back squat proper form"},
  "Barbell Deadlift":{sets:"3–4 sets · 5–8 reps",steps:["Bar over mid-foot, about 2.5 cm from your shins. Hip-width stance.","Hinge down and grip just outside your legs. Brace your core maximally.","Take all the slack out of the bar by pulling up gently before the actual lift.","Drive your feet into the floor and push the floor away as you stand.","Lock out at the top — hips and knees straight. Don't lean back.","Lower with control by hinging at the hips first, then bending the knees."],cue:"Before every rep, take a breath and brace. Treat each rep as a single maximum effort.",mistake:"Jerking the bar off the floor. Slack must be removed first or your lower back absorbs the shock.",search:"barbell deadlift form tutorial"},
  "DB Bulgarian Split Squat":{sets:"3 sets · 8–12 reps/side",steps:["Stand 60–90 cm in front of a bench. Place your rear foot on the bench (laces down).","Hold dumbbells at your sides. Stand tall.","Lower your hips straight down — not forward. Keep your torso upright.","Descend until your front thigh is parallel to the floor (or close).","Drive through your front heel to return. Don't let the knee cave in."],cue:"Your front foot does the work. Think of the rear leg as just a balance point.",mistake:"Leaning too far forward. Keep your chest up and shin as vertical as possible.",search:"bulgarian split squat dumbbell form"},
  "Copenhagen Plank":{sets:"2 sets · 30–45 sec/side",steps:["Lie on your side next to a bench. Place your top foot on the bench.","Prop yourself up on your forearm (elbow under shoulder).","Lift your hips off the floor until your body forms a straight line from head to heel.","Hold. Your bottom leg can hang or rest on the bench depending on difficulty.","Keep breathing. Don't let your hips sag."],cue:"Squeeze the inner thigh of your top leg into the bench — this activates your adductors.",mistake:"Letting your hips sag toward the floor. Think tall and long.",search:"copenhagen plank exercise"},
  "Bar Hang + Scapular Depression":{sets:"1–2 sets",steps:["Jump up and grip a pull-up bar with an overhand grip, hands shoulder-width.","Let your body hang completely relaxed — arms fully straight.","Hold this passive hang for 10 seconds. Breathe.","Then, without bending your elbows, pull your shoulder blades down toward your back pockets.","Your body will rise slightly. Hold for 1 second. Lower back to passive hang. Repeat 5–8 times."],cue:"The depression movement is small but deliberate — imagine putting your shoulder blades in your back pockets.",mistake:"Bending your elbows. This is a shoulder blade movement only, not a pull-up.",search:"scapular depression dead hang exercise"},
  "Prone IYTW":{sets:"2 sets · 6–8 reps",steps:["Lie face down on a mat or low incline bench. Arms extended overhead, thumbs pointing up.","I: Lift both arms straight overhead. Hold 1 sec. Lower.","Y: Lift arms at a 30° angle from overhead (Y shape). Hold 1 sec. Lower.","T: Lift arms straight out to the sides (T shape). Hold 1 sec. Lower.","W: Bend elbows, pull them back toward your hips, squeezing shoulder blades. Hold 1 sec."],cue:"Only lift as high as you can using shoulder blades alone. No momentum, no torso lift.",mistake:"Shrugging your shoulders up toward your ears. Keep them down and back throughout.",search:"prone IYTW exercise rotator cuff"},
  "Wide Grip Pull-Up":{sets:"3–5 sets · 5–10 reps",steps:["Hang from a bar with an overhand grip, hands wider than shoulder width.","Engage your core and squeeze your glutes.","Pull your elbows down and back, driving your chin over the bar.","Pause briefly at the top — chest to bar if possible.","Lower all the way down to a dead hang. Full extension every rep."],cue:"Initiate the pull by depressing your shoulder blades first — same as the scapular depression exercise.",mistake:"Not going to full extension at the bottom. Half reps build half the strength.",search:"wide grip pull up form"},
  "Dumbbell Seated Shoulder Press":{sets:"3 sets · 10 reps",steps:["Sit on a bench with back support. Hold dumbbells at shoulder height, palms forward.","Feet flat on the floor. Brace your core.","Press the dumbbells straight up until arms are fully extended overhead.","Don't let the dumbbells touch at the top — keep slight tension throughout.","Lower back to shoulder height with control."],cue:"Keep your lower back neutral — don't arch excessively as you press.",mistake:"Pressing at an angle rather than straight up. The dumbbells should track straight overhead.",search:"dumbbell seated shoulder press form"},
  "DB Lateral Raise":{sets:"3 sets · 12–15 reps",steps:["Stand with dumbbells at your sides, slight forward lean at the hips.","Keep a very slight bend in your elbows throughout.","Raise your arms out to the sides, leading with your elbows (not your hands).","Stop when your arms reach shoulder height — no higher.","Lower slowly — 3 seconds. Most people rush the descent."],cue:"Lead with your elbows, pinkies slightly higher than thumbs at the top. This isolates the medial delt.",mistake:"Swinging the weight up. If you need momentum, the weight is too heavy.",search:"dumbbell lateral raise technique"},
  "DB Front Raise":{sets:"3 sets · 12–15 reps",steps:["Stand with dumbbells in front of your thighs, palms facing down.","Keep a slight bend in your elbows.","Raise one or both arms forward to shoulder height. No higher.","Pause at the top, then lower with control over 2–3 seconds."],cue:"The front raise is a finisher, not a heavy lift. Keep loads modest — your front delt is already worked hard by pressing.",mistake:"Swinging your body to raise the weight. Lock your torso still.",search:"dumbbell front raise exercise"},
  "Single Arm Cable Lat Pulldown":{sets:"2–3 sets · 10–15 reps/side",steps:["Set the pulley high. Attach a single handle. Sit or half-kneel facing the machine.","Grip the handle with one hand, arm fully extended overhead.","Pull the handle down toward your hip in an arc, leading with your elbow.","At the bottom, squeeze your lat hard — imagine trying to crack a walnut in your armpit.","Return slowly to full extension. Feel the stretch at the top."],cue:"Lean slightly away from the cable. Think of pulling your elbow to your hip pocket.",mistake:"Shrugging the shoulder up at the top of the rep. Actively pull your shoulder blade down first.",search:"single arm cable lat pulldown form"},
  "Scapular Push-Up":{sets:"2–3 sets · 10–12 reps",steps:["Start in a high plank position, arms straight, core braced.","Without bending your elbows at all, let your chest sink between your shoulder blades (retract).","Then push your chest back up by spreading your shoulder blades apart (protract).","That's one rep. Elbows stay locked the entire time."],cue:"Think of it as a push-up where only your shoulder blades move.",mistake:"Bending the elbows. This is not a regular push-up — the movement is blade-only.",search:"scapular push up exercise"},
  "DB Bench Press":{sets:"3 sets · 8–10 reps",steps:["Sit on a flat bench with dumbbells on your thighs. Kick them up as you lie back.","Hold dumbbells at chest level, elbows at 60° from your torso.","Press up until arms are straight — dumbbells close together but not touching.","Lower slowly with control until you feel a stretch across your chest."],cue:"The dumbbell bench allows a more natural arm path than barbell — use this freedom but don't flare elbows.",mistake:"Letting the dumbbells drift too wide. Keep the path close to a 45° elbow angle.",search:"dumbbell flat bench press form"},
  "Seated Cable Row (Full Stretch)":{sets:"3 sets · 10–12 reps",steps:["Sit at a cable row machine with a close or medium grip handle.","Start with arms fully extended — let your shoulder blades slide forward and apart.","Initiate the pull by retracting your shoulder blades first.","Then bend your elbows and pull the handle to your lower sternum.","Squeeze your shoulder blades together at the end. Pause 1 second.","Return with full stretch — arms extended, blades forward."],cue:"The stretch at the front is half the exercise. Don't cut it short.",mistake:"Using your lower back to initiate the pull. The back should be still — only your arms and shoulder blades move.",search:"seated cable row full stretch form"},
  "Half Kneeling Anti-Rotation Press":{sets:"2 sets · 10–12 reps/side",steps:["Anchor a band or cable at chest height to your side. Half-kneel facing perpendicular to the anchor.","Hold the handle at your chest with both hands, elbows bent.","Press straight out in front of you until arms are extended.","Hold 1–2 seconds — resist the pull of the band trying to rotate you.","Return slowly. The challenge is keeping your torso completely still."],cue:"Your core is working the entire time — not just during the press, but during the hold.",mistake:"Letting your torso rotate toward the anchor. You should look as still as a statue.",search:"half kneeling anti rotation press"},
  "Barbell Romanian Deadlift":{sets:"3 sets · 8–10 reps",steps:["Stand with bar at hip height, overhand grip just outside your legs.","Push your hips backward — not down. Keep a slight knee bend throughout.","Lower the bar along your thighs until you feel a strong hamstring stretch (roughly mid-shin).","Pause at the bottom, then drive your hips forward to stand.","Keep the bar close to your body the entire time."],cue:"Imagine someone has a rope tied to your hips pulling them back. Sit into that pull.",mistake:"Squatting down instead of hinging. Your knees should barely bend — this is a hip hinge, not a squat.",search:"barbell romanian deadlift form"},
  "Front Plank":{sets:"3 sets · 45–60 sec",steps:["Lie face down. Place forearms on the ground, elbows under shoulders.","Push up onto your toes. Body forms a straight line from head to heels.","Squeeze your glutes, brace your core, and tuck your tailbone slightly.","Hold. Breathe steadily."],cue:"Squeeze every muscle — glutes, core, quads. A plank should feel hard.",mistake:"Letting your hips sag or pike up. Both are ways your body cheats the core.",search:"plank form tutorial"},
  "Side Plank Rotation":{sets:"3 sets · 10 reps/side",steps:["Start in a side plank — forearm on the ground, body in a straight line.","Raise your top arm straight toward the ceiling.","Rotate your torso downward, threading your top arm under your body.","Return to the start position. That's one rep.","Move at 3 seconds per rotation — slow and controlled."],cue:"This trains thoracic rotation. Go slow — fast rotations at 45 are a common rib and oblique strain.",mistake:"Collapsing the hip as you rotate. Keep your hips lifted throughout.",search:"side plank with rotation exercise"},
  "Machine Seated Reverse Fly":{sets:"2 sets · 12–15 reps",steps:["Sit reversed on a pec deck or fly machine — chest against the pad, facing the machine.","Grip the handles with elbows slightly bent. Don't change the elbow angle during the movement.","Fly your arms backward — as far back as the machine allows.","Squeeze your rear delts and upper traps at the end. Pause 1 second.","Return slowly — 2–3 seconds."],cue:"This targets your rear delts, the most undertrained shoulder muscle. Keep loads light enough to feel it.",mistake:"Shrugging your shoulders up as you pull back. Keep them down throughout.",search:"machine reverse fly rear delt"},
  "Standing Cable Chest Press":{sets:"4 sets · 8–10 reps",steps:["Set both pulleys to chest height. Stand between the cables facing away.","Hold a handle in each hand at chest level. Stagger your stance for stability.","Brace your core — your torso will want to twist; don't let it.","Press both handles forward until arms are extended. Squeeze your chest at the end.","Return slowly with control — the cables provide constant tension throughout."],cue:"Unlike a bench press, your core is working the entire time to stabilise your torso. This is a full-body exercise.",mistake:"Leaning too far forward. Keep your torso upright and let your arms do the work.",search:"standing cable chest press form"},
  "Seated Cable Row (Close Grip)":{sets:"3 sets · 10–12 reps",steps:["Use a close-grip V-bar handle. Sit upright with feet on the footplate.","Arms fully extended — let the shoulder blades spread forward.","Pull the handle to your lower sternum, elbows tracking close to your ribs.","Squeeze your shoulder blades together hard at the finish.","Return to full stretch with control."],cue:"Close grip emphasises your lower traps and lats more than a wide grip. Feel the difference.",mistake:"Rounding your lower back as you reach forward. Keep a neutral spine throughout.",search:"close grip seated cable row"},
  "DB Incline Chest Fly":{sets:"3 sets · 12–15 reps",steps:["Set bench to 30–45°. Hold dumbbells above chest, palms facing each other, slight elbow bend.","Lower the dumbbells out to the sides in a wide arc — feel the chest stretching.","Stop when you feel a strong but comfortable stretch.","Squeeze the dumbbells back together at the top. The elbow angle never changes."],cue:"This is a stretch-focused isolation exercise. The weight should be light enough to feel every inch of the movement.",mistake:"Straightening the elbows at the bottom — this shifts load to bicep tendons and risks injury.",search:"incline dumbbell chest fly form"},
  "Pallof Press":{sets:"3 sets · 12 reps/side",steps:["Set a cable or band at chest height. Stand side-on, one shoulder toward the anchor.","Hold the handle at your chest with both hands. Feet shoulder-width.","Press the handle straight out in front of you — arms fully extended.","Hold 1–2 seconds. Resist the cable pulling you toward the anchor.","Return to your chest. Your torso should not rotate at all."],cue:"The work happens during the hold. Don't rush through the extension.",mistake:"Rotating your torso toward the cable. The entire point is anti-rotation — nothing moves except your arms.",search:"pallof press anti rotation core"},
  "Single Leg RDL (DB)":{sets:"3 sets · 8 reps/side",steps:["Stand on one leg with a slight bend in the knee.","Hold a dumbbell in the opposite hand to the working leg.","Hinge at your hip — send your chest forward and the free leg back simultaneously.","Lower until you feel a strong hamstring stretch (roughly shin height).","Drive through your heel and squeeze your glute to return to standing."],cue:"Your body should form a straight line from head to raised heel at the bottom.",mistake:"Letting your lower back round as you descend. Keep a neutral spine throughout.",search:"single leg romanian deadlift dumbbell"},
  "Goblet Squat":{sets:"3 sets · 10 reps",steps:["Hold a heavy dumbbell vertically at chest height — both hands cupping the top plate.","Feet shoulder-width, toes turned out slightly.","Brace your core and sit down between your heels — not backward.","At the bottom, elbows track inside your knees. Torso stays upright.","Drive through your full foot to stand."],cue:"The goblet position forces you to stay upright. Let the weight teach you the movement.",mistake:"Caving the knees inward at the bottom. Push your elbows against your inner knees to keep them out.",search:"goblet squat form tutorial"},
  "DB Arnold Press":{sets:"3–4 sets · 5–12 reps",steps:["Sit on a bench. Hold dumbbells at chin height, palms facing you, elbows bent.","As you press up, rotate your palms forward so at the top they face away from you.","Arms should be fully extended overhead at the top.","Reverse the rotation as you lower — returning to palms-facing-you at chin height.","Move slowly — the rotation should take the full range of the press."],cue:"The rotation adds a rotator cuff training component that makes this safer than a strict military press.",mistake:"Rushing the rotation — it should be smooth and continuous, not a jerk at the top.",search:"arnold press dumbbell form"},
  "Chest-Supported DB Row":{sets:"4 sets · 6–8 reps",steps:["Set a bench to 45°. Lie face-down — chest and belly on the pad, feet on the floor.","Hold dumbbells hanging straight down, arms extended.","Row both dumbbells toward your hips simultaneously, elbows close to your sides.","Squeeze your shoulder blades together at the top. Hold 1 second.","Lower with control to full extension."],cue:"Because the bench supports your torso, you can go heavier than a regular row with zero lower back involvement.",mistake:"Flaring elbows out to 90°. Keep them close to your ribs — this targets the lats, not the rear delts.",search:"chest supported dumbbell row form"},
  "Farmer's Walk":{sets:"3 sets · 30m/side",steps:["Pick up a heavy dumbbell in one hand (suitcase carry).","Stand tall — don't lean toward the weight. Your torso should be vertical.","Walk 30m in a straight line with controlled, even steps.","Keep your shoulder on the loaded side packed down — don't let it shrug up.","Core braces laterally the entire time to resist tilting."],cue:"If your torso is tilting toward the weight, it's too heavy. Start lighter and build.",mistake:"Leaning away from the weight instead of staying tall. Both are compensation patterns.",search:"suitcase carry farmer walk exercise"},
  "Weighted Wide Grip Pull-Up":{sets:"5 sets · 5 reps",steps:["Attach a weight via a dip belt or hold a dumbbell between your legs.","Hang with an overhand wide grip, fully extended.","Pull yourself up until your chin clears the bar — leading with your elbows.","Pause at the top for 1 second.","Lower with complete control — 3 seconds. Full extension at the bottom."],cue:"The added weight makes full ROM even more critical. A sloppy rep with load is worse than no rep.",mistake:"Adding too much weight and losing full range. Better to add 2.5 kg and do it properly.",search:"weighted pull up form"},
  "Seated Upper Trap Stretch":{steps:["Sit upright on a chair or bench. Place one hand behind your lower back.","With the other hand, gently pull your head toward your shoulder — ear to shoulder.","Hold 30 seconds. Breathe deeply — you should feel the neck and upper trap release.","Switch sides."],cue:"Don't pull hard. A gentle nudge and your breathing does the releasing.",mistake:"Rotating your chin down or up. Keep your gaze forward, just pure lateral tilt.",search:"upper trapezius stretch seated"},
  "Active Lats Stretch":{steps:["Kneel on the floor in front of a bench or box at hip height.","Place both hands on the bench, elbows straight.","Walk your knees back until your arms are extended overhead.","Exhale and let your chest drop toward the floor while keeping your arms straight.","Hold at the bottom for 2 seconds, then return. That's one rep."],cue:"The exhale is what creates the stretch. Breathe in at the top, exhale as you drop.",mistake:"Bending the elbows as you drop. Arms stay locked straight.",search:"active lats stretch exercise"},
  "Bent Arm Chest Stretch":{steps:["Stand in a doorframe or against a wall. Raise your arm to 90°, elbow bent.","Place your forearm against the frame or wall.","Slowly rotate your body away from the arm until you feel the chest stretch.","Hold 30 seconds. Breathe into the stretch.","Switch sides."],cue:"Try it with your arm at different heights — 90°, 110°, 70°. Each hits a different part of the chest.",mistake:"Rushing through. Hold for the full time and breathe — the muscle needs time to release.",search:"doorway chest stretch bent arm"},
  "Wall Supported Hip Flexor Stretch":{steps:["Kneel facing a wall. Place one knee close to the wall — shin vertical against it if possible.","The other foot is flat on the floor in front of you.","Tilt your pelvis backward (posterior pelvic tilt) — flatten your lower back.","Hold this position and lean into the wall slightly.","Hold 40–45 seconds. You should feel the stretch deep in the front of the hip."],cue:"The posterior pelvic tilt is what creates the stretch. Without it, you're just kneeling.",mistake:"Arching the lower back. This deactivates the stretch. Keep the lower back flat.",search:"wall hip flexor stretch kneeling"},
  "Cat-Cow":{steps:["Start on all fours — hands under shoulders, knees under hips.","Cat: Exhale fully. Round your spine toward the ceiling, tuck your chin and tailbone.","Cow: Inhale deeply. Drop your belly toward the floor, lift your gaze and tailbone.","Move continuously and smoothly between the two — let your breath drive the rhythm.","Complete 8–12 reps."],cue:"The breath is the exercise. Exhale creates the Cat, inhale creates the Cow.",mistake:"Moving too fast. Slow down and feel each vertebra move through the sequence.",search:"cat cow spine exercise"},
  "Adductor Rockback":{steps:["Start on all fours. Spread one knee wide out to the side.","Slowly rock your hips backward toward your heel on the extended side.","You should feel the inner thigh (adductor) of the wide leg stretching.","Hold at the deepest point for 2 seconds, then rock forward.","Complete all reps on one side, then switch."],cue:"The further back you rock, the deeper the stretch. Only go as far as you can without pain.",mistake:"Letting your lower back round as you rock back. Keep the spine neutral.",search:"adductor rockback stretch exercise"},
  "Frog Hip Internal Rotation":{steps:["Start on all fours. Walk your knees wide — wider than hip width. Toes pointing out.","Lower your forearms to the floor for support.","Alternate rotating each leg inward — drop the foot toward the midline.","The goal is to get the shin closer to flat on the floor.","Move slowly and breathe into the stretch."],cue:"This trains hip internal rotation, which is often very stiff in people who sit a lot.",mistake:"Forcing the range. Move only as far as your hip allows without lower back compensation.",search:"frog hip internal rotation stretch"},
  "Half Kneeling Long Split":{steps:["Kneel on one knee on a pad. Front foot flat on the floor directly in front of the back knee.","Keep your torso tall and upright. Brace your core lightly.","Shift your weight forward slightly until you feel a stretch in the front of the rear hip.","Hold 40–45 seconds. Breathe steadily.","Switch sides."],cue:"Keep the back glute squeezed. This increases the hip flexor stretch.",mistake:"Leaning forward with your torso. The stretch comes from hip position, not trunk lean.",search:"half kneeling hip flexor stretch"},
  "90/90 Hip Switch":{steps:["Sit on the floor with both knees bent at 90°. One knee forward, one to the side.","Keep your torso tall.","Rotate your hips to switch legs to the opposite 90/90 position.","Use your hands lightly for support as you transition.","Repeat 10 times on each side."],cue:"This movement trains both internal and external hip rotation simultaneously — one of the most complete hip exercises.",mistake:"Letting the torso collapse as you switch. Keep your chest up throughout.",search:"90 90 hip switch mobility"},
  "Scapular Push-Up":{steps:["Start in a high plank — hands under shoulders, body in a straight line.","Without bending your elbows, let your chest sink between your shoulder blades (retraction).","Then push the floor away to spread your shoulder blades apart (protraction).","Hold at the end of protraction — push as far forward as possible.","Return. That's one rep."],cue:"Think: let it happen (retract) then make it happen (protract). The protract should feel like effort.",mistake:"Bending the elbows at any point. Lock them out and keep them locked.",search:"scapular push up exercise serratus"}
};

// ─── STATE ───────────────────────────────────────────────────────────────────
const STORE_KEY='wkapp_v5';
function loadState(){try{const r=localStorage.getItem(STORE_KEY);if(r)return JSON.parse(r);}catch(e){}return{logs:{},rm:{},rmHistory:{},bw:[],startDate:null,trainingDays:[1,3,5],mobChecks:{}};}
function saveState(){try{const t={logs:S.logs,rm:S.rm,rmHistory:S.rmHistory,bw:S.bw,startDate:S.startDate,trainingDays:S.trainingDays,mobChecks:S.mobChecks};localStorage.setItem(STORE_KEY,JSON.stringify(t));}catch(e){}}
let S=loadState();
if(!S.rmHistory)S.rmHistory={};
if(!S.mobChecks)S.mobChecks={};

function phaseFor(w){return w<=4?0:w<=8?1:w<=12?2:3;}
function dayKey(w,d){return`w${w}d${d}`;}
function getLog(w,d){return S.logs[dayKey(w,d)]||{};}
function setLog(w,d,data){S.logs[dayKey(w,d)]=data;saveState();}
function dateStr(d){return d.toISOString().split('T')[0];}
function todayStr(){return dateStr(new Date());}
function formatDateDisplay(ds){if(!ds)return'—';const d=new Date(ds+'T00:00:00');return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}

// Mob check key: date string
function getMobCheckKey(){return todayStr();}
function getMobChecks(){return S.mobChecks[getMobCheckKey()]||{};}
function setMobCheck(idx,val){if(!S.mobChecks[getMobCheckKey()])S.mobChecks[getMobCheckKey()]={};S.mobChecks[getMobCheckKey()][idx]=val;saveState();}
function countMobChecked(){const c=getMobChecks();return Object.values(c).filter(Boolean).length;}

// ─── SCHEDULE ────────────────────────────────────────────────────────────────
function buildSchedule(){
  if(!S.startDate||!S.trainingDays)return[];
  const start=new Date(S.startDate+'T00:00:00');
  const days=[...S.trainingDays].sort((a,b)=>a-b);
  const sessions=[];let count=0;let d=new Date(start);let itr=0;
  while(count<48&&itr<500){itr++;const dow=d.getDay();if(days.includes(dow)){sessions.push({date:dateStr(d),week:Math.floor(count/3)+1,dayIdx:count%3,sessionIdx:count});count++;}d.setDate(d.getDate()+1);}
  return sessions;
}
function getSchedule(){
  if(!S._sc||S._scS!==S.startDate||S._scD!==JSON.stringify(S.trainingDays)){S._sc=buildSchedule();S._scS=S.startDate;S._scD=JSON.stringify(S.trainingDays);}
  return S._sc;
}
function getTodaySession(){return getSchedule().find(s=>s.date===todayStr())||null;}
function getNextPendingSession(){const t=todayStr();for(const s of getSchedule()){if(s.date>=t&&!isSessionDone(s.week,s.dayIdx))return s;}return null;}
function getMissedSessions(){const t=todayStr();return getSchedule().filter(s=>s.date<t&&!isSessionDone(s.week,s.dayIdx));}
function isSessionDone(w,d){return!!(S.logs[dayKey(w,d)]||{})._completed;}
function slideProgramForward(){const missed=getMissedSessions();if(!missed.length){closeModal('modal-missed');return;}const e=missed[0].date;const td=new Date(todayStr()+'T00:00:00'),ed=new Date(e+'T00:00:00');const diff=Math.round((td-ed)/86400000);const ns=new Date(S.startDate+'T00:00:00');ns.setDate(ns.getDate()+diff);S.startDate=dateStr(ns);S._sc=null;saveState();closeModal('modal-missed');renderToday();}

// ─── 1RM ─────────────────────────────────────────────────────────────────────
function calcEpley(w,r){return r===1?w:Math.round(w*(1+r/30));}
function getRM(id){const rm=S.rm[id];if(!rm)return null;if(rm.weight&&rm.reps)return calcEpley(parseFloat(rm.weight),parseInt(rm.reps));return null;}
function getExRec(ex){const lid=LIFT_TO_RM[ex.n];if(!lid)return null;const pct=parsePct(ex.load);if(!pct)return null;const rm=getRM(lid);if(!rm)return null;return{kg:Math.round(rm*pct/2.5)*2.5,pct:Math.round(pct*100),rm};}
function needsRMRetest(){
  const next=getNextPendingSession();if(!next)return false;
  if(PHASE_CHANGE_WEEKS.includes(next.week)&&next.dayIdx===0){
    // Check if we haven't retested this phase
    const phaseKey=`phase_retest_${next.week}`;
    return!S.rm[phaseKey];
  }
  return false;
}

// ─── TIMER ───────────────────────────────────────────────────────────────────
let timer={running:false,elapsed:0,target:0,iv:null};
function startTimer(s){if(timer.iv)clearInterval(timer.iv);timer={running:true,elapsed:0,target:s,iv:null};timer.iv=setInterval(()=>{timer.elapsed++;if(timer.elapsed>=timer.target){clearInterval(timer.iv);timer.running=false;try{const a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.6);o.start();o.stop(a.currentTime+0.6);}catch(e){}}refreshTimer();},1000);refreshTimer();}
function stopTimer(){if(timer.iv)clearInterval(timer.iv);timer={running:false,elapsed:0,target:0,iv:null};refreshTimer();}
function refreshTimer(){const el=document.getElementById('timer-display'),prog=document.getElementById('timer-prog'),btns=document.getElementById('timer-btns');if(!el)return;const rem=Math.max(0,timer.target-timer.elapsed),m=Math.floor(rem/60),s=rem%60;if(!timer.target){el.textContent='—';el.className='timer-display';if(prog)prog.style.width='0%';if(btns)btns.innerHTML='<button class="btn btn-sm" onclick="startTimer(60)">60s</button><button class="btn btn-sm" onclick="startTimer(90)">90s</button><button class="btn btn-sm" onclick="startTimer(120)">2 min</button>';}else{el.textContent=`${m}:${String(s).padStart(2,'0')}`;el.className='timer-display'+(rem===0?' done':rem<=15?' warn':'');if(prog)prog.style.width=Math.round(timer.elapsed/timer.target*100)+'%';if(btns)btns.innerHTML='<button class="btn btn-sm" onclick="stopTimer()">Reset</button>';}}

// ─── SETUP ───────────────────────────────────────────────────────────────────
function initSetup(){
  document.getElementById('setup-date').value=todayStr();
  const dp=document.getElementById('day-picker');
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let selected=[1,3,5];
  dp.innerHTML='';
  [1,2,3,4,5,6,0].forEach(d=>{
    const b=document.createElement('button');
    b.className='btn btn-sm'+(selected.includes(d)?' btn-primary':'');
    b.textContent=dayNames[d];
    b.onclick=()=>{
      const i=selected.indexOf(d);
      if(i>-1){if(selected.length<=3)return;selected.splice(i,1);b.className='btn btn-sm';}
      else{if(selected.length>=3){const old=selected.shift();dp.querySelectorAll('.btn-primary')[0]&&dp.querySelectorAll('button').forEach(x=>{if(parseInt(x.dataset.d)==old)x.className='btn btn-sm';});}selected.push(d);b.className='btn btn-sm btn-primary';}
      S.trainingDays=selected;
    };
    b.dataset.d=d;
    dp.appendChild(b);
  });
  S.trainingDays=selected;
  document.getElementById('modal-setup').classList.add('open');
}
function saveSetup(){const v=document.getElementById('setup-date').value;if(!v){alert('Please pick a start date');return;}S.startDate=v;S._sc=null;saveState();closeModal('modal-setup');renderToday();}

let viewingSession=null;
function renderToday(){
  if(!S.startDate){initSetup();return;}
  const missed=getMissedSessions();
  const todaySess=getTodaySession();
  const next=getNextPendingSession();
  let sess=viewingSession;
  if(!sess){if(todaySess&&!isSessionDone(todaySess.week,todaySess.dayIdx))sess={week:todaySess.week,dayIdx:todaySess.dayIdx};else if(next)sess={week:next.week,dayIdx:next.dayIdx};else sess={week:16,dayIdx:2};}
  const w=sess.week,di=sess.dayIdx,pi=phaseFor(w),phase=P.phases[pi],day=phase.days[di],log=getLog(w,di);
  const sched=getSchedule(),schedEntry=sched.find(s=>s.week===w&&s.dayIdx===di),schedDate=schedEntry?schedEntry.date:null;
  const isDeload=w===16,today=todayStr(),isToday=schedDate===today,isFuture=schedDate&&schedDate>today,alreadyCompleted=!!log._completed;
  let doneSets=0,totalSets=0;
  day.exercises.forEach((ex,ei)=>{totalSets+=ex.sets;const el=log[ei]||{};for(let si=0;si<ex.sets;si++)if(el[si]&&el[si].done)doneSets++;});
  const pct=totalSets>0?Math.round(doneSets/totalSets*100):0,allDone=pct===100&&!alreadyCompleted;
  const rmRetest=needsRMRetest();

  if(rmRetest)html+=`<div class="alert alert-purple" style="margin-bottom:10px">Phase change coming — consider retesting your 1RM for accurate weight targets. <a onclick="showScreen('strength',document.querySelectorAll('.nav-item')[2])" style="color:var(--purple);text-decoration:underline;cursor:pointer">Go to 1RM tab →</a></div>`;
  html+=`<div class="page-header"><div class="row"><div><div class="page-title">Week ${w} · Day ${di+1}</div><div class="page-sub">${formatDateDisplay(schedDate)} · ${phase.short}</div></div><div style="display:flex;gap:6px;align-items:center">${isToday?'<span class="badge badge-green">Today</span>':''}${isFuture?'<span class="badge badge-blue">Upcoming</span>':''}${alreadyCompleted?'<span class="badge badge-purple">Done ✓</span>':''}<button class="btn btn-sm" onclick="openWeekPicker()" style="font-size:11px">Jump</button></div></div></div>`;
  if(isDeload)html+=`<div class="alert alert-blue">Deload week — drop all loads 40–50%, reduce sets by 1, RPE 5–6 out of 10.</div>`;
  if(day.note)html+=`<div class="alert alert-amber">${day.note}</div>`;
  html+=`<div class="warmup-box"><div class="warmup-label">WARMUP</div><div class="warmup-text">${day.warmup}</div></div>`;
  if(!alreadyCompleted)html+=`<div class="row" style="margin-bottom:8px"><span style="font-size:12px;color:var(--muted)">${doneSets} / ${totalSets} sets</span><span style="font-size:12px;font-family:var(--mono);color:${pct===100?'var(--accent)':'var(--muted)'};">${pct}%</span></div><div class="prog-track" style="margin-bottom:14px"><div class="prog-fill" style="width:${pct}%"></div></div>`;
  day.exercises.forEach((ex,ei)=>{
    const exLog=log[ei]||{};
    const exAllDone=!alreadyCompleted&&Object.values(exLog).filter(v=>v&&v.done).length>=ex.sets;

    const ref=EXREF[ex.n];
    html+=`<div class="ex-card ${exAllDone?'done':''}">`;

    else if(LIFT_TO_RM[ex.n]&&!getRM(LIFT_TO_RM[ex.n]))html+=`<div class="alert alert-blue" style="margin:6px 0;font-size:11px;padding:6px 10px">Enter your 1RM in the 1RM tab to get weight targets for this exercise</div>`;

}

function logField(w,di,ei,si,f,v){const l=getLog(w,di);if(!l[ei])l[ei]={};if(!l[ei][si])l[ei][si]={};l[ei][si][f]=v;setLog(w,di,l);}
function toggleDone(w,di,ei,si){const l=getLog(w,di);if(!l[ei])l[ei]={};if(!l[ei][si])l[ei][si]={};l[ei][si].done=!l[ei][si].done;setLog(w,di,l);renderToday();}
function completeSession(w,di){const l=getLog(w,di);l._completed=true;l._completedDate=todayStr();setLog(w,di,l);viewingSession=null;window.scrollTo(0,0);renderToday();}
function uncompleteSession(w,di){const l=getLog(w,di);delete l._completed;delete l._completedDate;setLog(w,di,l);renderToday();}
function openMissedModal(){const m=getMissedSessions();let html=`<div class="alert alert-amber" style="margin-bottom:12px">You have ${m.length} unlogged session${m.length>1?'s':''} in the past. Tap "Slide program forward" to realign your schedule to today.</div>`;m.forEach(s=>{const ph=P.phases[phaseFor(s.week)],d=ph.days[s.dayIdx];html+=`<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center"><span class="badge badge-red">Wk ${s.week}</span><div><div style="font-size:13px;color:var(--text)">${d.name}</div><div style="font-size:11px;color:var(--muted)">${formatDateDisplay(s.date)}</div></div></div>`;});document.getElementById('modal-missed-body').innerHTML=html;document.getElementById('modal-missed').classList.add('open');}
function openWeekPicker(){const sched=getSchedule(),today=todayStr(),grid=document.getElementById('week-picker-grid');let h='';for(let w=1;w<=16;w++)for(let di=0;di<3;di++){const e=sched.find(s=>s.week===w&&s.dayIdx===di),done=isSessionDone(w,di),isT=e&&e.date===today,isCurr=viewingSession&&viewingSession.week===w&&viewingSession.dayIdx===di;h+=`<div class="week-cell${done?' done':isT||isCurr?' current':''}" onclick="jumpTo(${w},${di})" style="font-size:10px"><span class="wn" style="font-size:12px">W${w}</span><span>D${di+1}</span></div>`;}grid.innerHTML=h;document.getElementById('week-picker-modal').classList.add('open');}

// ─── EXERCISE REFERENCE PANEL ─────────────────────────────────────────────────

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
let calViewMonth=null;
function renderCalendar(){
  if(!calViewMonth){const n=new Date();calViewMonth={year:n.getFullYear(),month:n.getMonth()};}
  const{year,month}=calViewMonth,sched=getSchedule(),today=todayStr();
  const firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0),daysInMonth=lastDay.getDate(),startDow=firstDay.getDay();

  html+=`<div class="cal-grid">`;

  for(let d=1;d<=daysInMonth;d++){
    const date=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry=sched.find(s=>s.date===date),isToday=date===today,isFut=date>today;
    let cls='',label='';
    if(entry){const done=isSessionDone(entry.week,entry.dayIdx);cls=done?'completed':isToday?'today-workout':isFut?'has-workout future':'missed has-workout';label=`D${entry.dayIdx+1}`;}
    else if(isToday)cls='today-rest';
    const oc=entry?`onclick="jumpTo(${entry.week},${entry.dayIdx});showScreenById('today')"`:'' ;

  [{c:'var(--accent)',l:'Today/active'},{c:'rgba(74,222,128,.15)',l:'Done'},{c:'rgba(248,113,113,.15)',l:'Missed'},{c:'var(--surf2)',l:'Upcoming'}].forEach(x=>html+=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:${x.c};display:inline-block"></span><span style="color:var(--muted)">${x.l}</span></span>`);

function calPrevMonth(){calViewMonth.month--;if(calViewMonth.month<0){calViewMonth.month=11;calViewMonth.year--;}renderCalendar();}
function calNextMonth(){calViewMonth.month++;if(calViewMonth.month>11){calViewMonth.month=0;calViewMonth.year++;}renderCalendar();}
function changeStartDate(){const d=prompt('Enter new start date (YYYY-MM-DD):',S.startDate);if(d&&/^\d{4}-\d{2}-\d{2}$/.test(d)){S.startDate=d;S._sc=null;saveState();renderCalendar();}}

// ─── 1RM SCREEN ───────────────────────────────────────────────────────────────
function renderStrength(){
  let html=`<div class="page-header"><div class="page-title">1RM Calculator</div><div class="page-sub">Update at each phase change (~every 4 weeks)</div></div>`;
  html+=`<div class="alert alert-blue" style="margin-bottom:14px"><strong>How to use:</strong> Enter a weight and reps from any recent working set. The Epley formula calculates your estimated 1RM. Weight fields in Today's session turn green when you're on target (within 7%).<br><br><strong>When to retest:</strong> At each phase change — Weeks 5, 9, and 13. The app will remind you.</div>`;

      if(hist.length>0){html+=`<div class="rm-history"><div style="font-size:10px;letter-spacing:.06em;margin-bottom:4px">RETEST HISTORY</div>`;hist.forEach(h=>html+=`<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span>${formatDateDisplay(h.date)}</span><span style="color:var(--text)">${h.estimated} kg 1RM</span></div>`);html+=`</div>`;}
      html+=`</div><button class="btn btn-sm" onclick="snapshotRM('${lift.id}')" style="margin-top:8px">Save as retest snapshot</button>`;

function saveRM(id,field,val){if(!S.rm[id])S.rm[id]={};S.rm[id][field]=val;if(S.rm[id].weight&&S.rm[id].reps)S.rm[id].estimated=calcEpley(parseFloat(S.rm[id].weight),parseInt(S.rm[id].reps));saveState();}
function snapshotRM(id){
  const rm=S.rm[id];if(!rm||!rm.weight||!rm.reps)return;

  S.rmHistory[id].push({date:todayStr(),weight:parseFloat(rm.weight),reps:parseInt(rm.reps),estimated:calcEpley(parseFloat(rm.weight),parseInt(rm.reps))});
  // Mark phase retest done
  const next=getNextPendingSession();if(next&&PHASE_CHANGE_WEEKS.includes(next.week))S.rm[`phase_retest_${next.week}`]=true;
  saveState();renderStrength();
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function renderProgress(){

  let totalSets=0,totalReps=0,sessComp=0,onTgt=0,chkd=0;
  const wkSets={};
  for(let w=1;w<=16;w++){wkSets[w]=0;for(let di=0;di<3;di++){const l=getLog(w,di);if(l._completed)sessComp++;const ph=P.phases[phaseFor(w)],d=ph.days[di];d.exercises.forEach((ex,ei)=>{const el=l[ei]||{},rec=getExRec(ex);for(let si=0;si<ex.sets;si++){const s=el[si]||{};if(s.done){totalSets++;wkSets[w]++;}if(s.reps)totalReps+=parseInt(s.reps)||0;if(rec&&s.weight){chkd++;const wv=parseFloat(s.weight);if(Math.abs(wv-rec.kg)<=rec.kg*.07)onTgt++;}}});}}
  const pct=Math.round(sessComp/48*100),adh=chkd>0?Math.round(onTgt/chkd*100):null;

  let html=`<div class="page-header"><div class="row"><div><div class="page-title">Progress</div><div class="page-sub">Bill Zhou · 16-week program</div></div><button class="btn btn-sm" onclick="openBWModal()">+ Weight</button></div></div>`;
  html+=`<div class="stat-grid"><div class="stat-card"><div class="stat-num">${sessComp}</div><div class="stat-lbl">Sessions done</div></div><div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-lbl">Program complete</div></div><div class="stat-card"><div class="stat-num">${totalSets}</div><div class="stat-lbl">Total sets</div></div><div class="stat-card"><div class="stat-num">${mobStreak}</div><div class="stat-lbl">Mobility streak</div></div></div>`;
  if(adh!==null)html+=`<div class="card"><div class="row"><span style="font-size:14px;font-weight:500">Weight adherence</span><span class="${adh>=80?'badge badge-green':adh>=60?'badge badge-amber':'badge badge-red'}">${adh}%</span></div><div style="font-size:12px;color:var(--muted);margin:6px 0">Sets within 7% of recommended target weight</div><div class="prog-track"><div class="prog-fill" style="width:${adh}%;background:${adh>=80?'var(--accent)':adh>=60?'var(--amber)':'var(--red)'}"></div></div></div>`;
  // 1RM summary
  html+=`<div class="section-label">1RM entries</div><div class="card">`;
  RM_LIFTS.forEach(l=>{const rm=getRM(l.id);html+=`<div class="row" style="padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${l.name}</span>${rm?`<span style="font-size:13px;font-family:var(--mono);color:var(--accent)">${rm} kg 1RM</span>`:`<span style="font-size:12px;color:var(--muted)">Not set</span>`}</div>`;});
  html+=`</div>`;
  // Bodyweight chart
  html+=`<div class="section-label">Bodyweight (kg)</div>`;
  if(S.bw&&S.bw.length>0){
    const sorted=[...S.bw].sort((a,b)=>a.date.localeCompare(b.date)),vals=sorted.map(b=>b.weight),minW=Math.min(...vals)-1,maxW=Math.max(...vals)+1,range=maxW-minW||1;
    html+=`<div class="card">`;
    if(sorted.length===1){html+=`<div style="text-align:center;padding:16px"><div style="font-size:28px;font-weight:600;font-family:var(--mono)">${vals[0]} kg</div><div style="font-size:12px;color:var(--muted)">${formatDateDisplay(sorted[0].date)}</div></div>`;}
    else{const W=340,H=100,n=sorted.length,pts=sorted.map((b,i)=>`${n>1?(i/(n-1))*(W-20)+10:W/2},${H-((b.weight-minW)/range)*(H-20)-10}`);html+=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto"><polyline points="${pts.join(' ')}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>${sorted.map((b,i)=>{const[x,y]=pts[i].split(',');return`<circle cx="${x}" cy="${y}" r="3" fill="var(--accent)"/>`;}).join('')}<text x="10" y="${H-2}" font-size="9" fill="var(--muted)" font-family="monospace">${formatDateDisplay(sorted[0].date)}</text><text x="${W-10}" y="${H-2}" font-size="9" fill="var(--muted)" font-family="monospace" text-anchor="end">${formatDateDisplay(sorted[sorted.length-1].date)}</text><text x="10" y="12" font-size="9" fill="var(--muted)" font-family="monospace">${maxW.toFixed(1)}</text></svg>`;}
    html+=`<div class="divider"></div>`;
    sorted.slice(-5).reverse().forEach((b,i)=>{const prev=sorted[sorted.indexOf(b)-1],diff=prev?(b.weight-prev.weight).toFixed(1):null;html+=`<div class="row" style="padding:5px 0;${i<4?'border-bottom:1px solid var(--border)':''}"><span style="font-size:12px;color:var(--muted)">${formatDateDisplay(b.date)}</span><div style="display:flex;align-items:center;gap:8px">${diff?`<span style="font-size:11px;color:${parseFloat(diff)<0?'var(--accent)':parseFloat(diff)>0?'var(--red)':'var(--muted)'}">${parseFloat(diff)>0?'+':''}${diff}</span>`:''}<span style="font-size:14px;font-weight:500;font-family:var(--mono)">${b.weight} kg</span><button class="btn btn-sm btn-ghost" onclick="deleteBW('${b.date}')" style="color:var(--red);padding:3px 6px">×</button></div></div>`;});
    html+=`</div>`;
  }else{html+=`<div class="card" style="text-align:center;padding:20px"><div style="font-size:13px;color:var(--muted);margin-bottom:10px">No bodyweight entries yet</div><button class="btn btn-sm" onclick="openBWModal()">+ Log weight</button></div>`;}
  // Sets per week
  html+=`<div class="section-label">Sets logged per week</div><div class="card">`;
  const maxS=Math.max(...Object.values(wkSets),1);
  for(let w=1;w<=16;w++){const bp=Math.round(wkSets[w]/maxS*100);html+=`<div class="bar-row"><div class="bar-label">Wk ${w}</div><div class="bar-outer"><div class="bar-inner" style="width:${bp}%;${w===16?'background:var(--blue)':''}"></div></div><div class="bar-val">${wkSets[w]}</div></div>`;}
  html+=`</div>`;
  // Phase overview
  html+=`<div class="section-label">Phase overview</div><div class="card">`;
  [{label:"Phase 1 — Foundation",sub:"Weeks 1–4",start:1,end:4},{label:"Phase 2 — Volume",sub:"Weeks 5–8",start:5,end:8},{label:"Phase 3 — Hypertrophy",sub:"Weeks 9–12",start:9,end:12},{label:"Phase 4 — Strength Peak",sub:"Weeks 13–15",start:13,end:15},{label:"Deload",sub:"Week 16",start:16,end:16}].forEach((ph,i,arr)=>{
    let phD=0,phT=0;for(let w=ph.start;w<=ph.end;w++)for(let d=0;d<3;d++){phT++;if(isSessionDone(w,d))phD++;}
    const phPct=Math.round(phD/phT*100);
    html+=`<div style="padding:10px 0;${i<arr.length-1?'border-bottom:1px solid var(--border)':''}"><div class="row" style="margin-bottom:6px"><div><div style="font-size:13px;font-weight:500">${ph.label}</div><div style="font-size:11px;color:var(--muted)">${ph.sub}</div></div><span style="font-size:13px;font-family:var(--mono);color:${phD===phT?'var(--accent)':'var(--muted)'}">${phD}/${phT}</span></div><div class="prog-track"><div class="prog-fill" style="width:${phPct}%"></div></div></div>`;
  });
  html+=`</div><div class="divider"></div><button class="btn btn-ghost btn-danger" onclick="if(confirm('Reset ALL data? Cannot be undone.')){localStorage.removeItem('${STORE_KEY}');location.reload()}">Reset all data</button>`;
  document.getElementById('screen-progress').innerHTML=html;
}
function openBWModal(){document.getElementById('bw-date').value=todayStr();document.getElementById('bw-input').value='';document.getElementById('modal-bw').classList.add('open');}
function saveBW(){const w=parseFloat(document.getElementById('bw-input').value),d=document.getElementById('bw-date').value;if(!w||!d){alert('Please enter weight and date');return;}if(!S.bw)S.bw=[];S.bw=S.bw.filter(e=>e.date!==d);S.bw.push({date:d,weight:w});S.bw.sort((a,b)=>a.date.localeCompare(b.date));saveState();closeModal('modal-bw');renderProgress();}
function deleteBW(date){S.bw=(S.bw||[]).filter(e=>e.date!==date);saveState();renderProgress();}

// ─── MOBILITY CHECKLIST ───────────────────────────────────────────────────────
let mobPhaseView=-1,expandedMob=-1;
function renderMobility(){
  if(mobPhaseView===-1){const n=getNextPendingSession();mobPhaseView=n?phaseFor(n.week):0;}
  const mob=MOB_DATA[mobPhaseView],checks=getMobChecks(),totalItems=mob.items.length,checkedCount=Object.values(checks).filter(Boolean).length;
  const pct=Math.round(checkedCount/totalItems*100);
  let html=`<div class="page-header"><div class="page-title">Mobility</div><div class="page-sub">Rest day checklist · mandatory</div></div>`;
  html+=`<div class="alert alert-amber" style="margin-bottom:12px">Do this on every rest day — non-negotiable for 45+. Tap each exercise when done. Tap the name to see how to do it.</div>`;
  html+=`<div class="phase-tabs">`;
  MOB_DATA.forEach((m,i)=>html+=`<button class="phase-tab${i===mobPhaseView?' active':''}" onclick="switchMobPhase(${i})">${['Ph 1','Ph 2','Ph 3','Ph 4'][i]}</button>`);
  html+=`</div>`;
  // Progress ring
  html+=`<div class="card" style="margin-bottom:14px"><div class="row"><div><div style="font-size:14px;font-weight:500">${mob.phase}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${mob.dur} · ${checkedCount}/${totalItems} done</div></div>`;
  // SVG ring
  const r=22,circ=2*Math.PI*r,dash=circ*(pct/100),gap=circ-dash;
  html+=`<svg class="mob-ring" viewBox="0 0 56 56"><circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--surf2)" stroke-width="5"/><circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--accent)" stroke-width="5" stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${(circ/4).toFixed(1)}" stroke-linecap="round"/><text x="28" y="33" text-anchor="middle" font-size="12" font-weight="600" font-family="monospace" fill="var(--text)">${pct}%</text></svg>`;
  html+=`</div>`;
  if(pct===100)html+=`<div class="alert alert-green" style="margin-top:10px;margin-bottom:0">All done for today — great work!</div>`;
  html+=`</div>`;
  mob.items.forEach((item,i)=>{
    const checked=!!checks[i],expanded=expandedMob===i,ref=EXREF[item.n];
    html+=`<div class="mob-check-card${checked?' checked':''}${expanded?' expanded':''}">`;
    html+=`<div class="mob-check-row" onclick="toggleMobCheck(${i})"><div class="mob-checkbox">${checked?'✓':''}</div><div style="flex:1"><div class="mob-check-name">${item.n}${item.isNew?` <span class="badge badge-amber" style="font-size:10px;padding:1px 5px">new</span>`:''}</div><div class="mob-check-meta">${item.sets}×${item.hold}</div></div><button class="help-btn" style="margin-left:0" onclick="event.stopPropagation();toggleMobExpand(${i})">${expanded?'▲':'▼'}</button></div>`;
    if(item.note)html+=`<div style="font-size:12px;color:var(--muted);margin:8px 0 0;padding-top:8px;border-top:1px solid var(--border)">${item.note}</div>`;
    if(expanded&&ref){
      html+=`<div class="mob-detail">`;
      if(ref.steps){html+=`<ol class="mob-steps">`;ref.steps.forEach(s=>html+=`<li><span>${s}</span></li>`);html+=`</ol>`;}
      if(ref.cue)html+=`<div style="font-size:12px;color:var(--accent);background:var(--accent-dim);border-radius:6px;padding:8px;margin-top:8px">💡 ${ref.cue}</div>`;
      if(ref.search){const q=encodeURIComponent(ref.search+' how to');html+=`<a href="https://www.youtube.com/results?search_query=${q}" class="ref-link" style="margin-top:8px" target="_blank">▶ Watch on YouTube</a>`;}
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  if(checkedCount<totalItems)html+=`<button class="btn btn-ghost" onclick="clearMobChecks()">Reset today's checklist</button>`;
  document.getElementById('screen-mobility').innerHTML=html;
}
function toggleMobCheck(i){setMobCheck(i,!getMobChecks()[i]);renderMobility();}
function toggleMobExpand(i){expandedMob=expandedMob===i?-1:i;renderMobility();}
function clearMobChecks(){S.mobChecks[getMobCheckKey()]={};saveState();renderMobility();}
function switchMobPhase(i){mobPhaseView=i;expandedMob=-1;renderMobility();}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function showScreen(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  window.scrollTo(0,0);
  if(id==='today')renderToday();
  if(id==='calendar')renderCalendar();
  if(id==='strength')renderStrength();
  if(id==='progress')renderProgress();
  if(id==='mobility'){mobPhaseView=-1;expandedMob=-1;renderMobility();}
}
function showScreenById(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach((b,i)=>b.classList.toggle('active',['today','calendar','strength','progress','mobility'][i]===id));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='today')renderToday();
  if(id==='calendar')renderCalendar();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if(!S.startDate)initSetup();else renderToday();
</script>
</body>
