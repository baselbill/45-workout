<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0f1117">
<title>Strength Program — Bill Zhou</title>
<style>
:root{--bg:#0f1117;--surf:#1a1d26;--surf2:#22263a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0f0f0;--muted:#7a7f96;--accent:#4ade80;--accent-dim:rgba(74,222,128,0.12);--amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);--blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);--red:#f87171;--red-dim:rgba(248,113,113,0.12);--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);--orange:#fb923c;--orange-dim:rgba(251,146,60,0.12);--r:12px;--r-sm:8px;
--mono:ui-monospace,'SF Mono','Monaco','Cascadia Mono','Segoe UI Mono','Roboto Mono',monospace;
--sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
#main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 110px;-webkit-overflow-scrolling:touch}
#main::-webkit-scrollbar{display:none}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--surf);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:.03em;transition:color .15s}
.nav-item svg{width:22px;height:22px}.nav-item.active{color:var(--accent)}
.screen{display:none;padding-top:16px}.screen.active{display:block}
.page-title{font-size:22px;font-weight:600;color:var(--text)}.page-sub{font-size:13px;color:var(--muted);margin-top:3px}.page-header{padding:8px 0 16px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;font-family:var(--mono)}
.badge-green{background:var(--accent-dim);color:var(--accent)}.badge-amber{background:var(--amber-dim);color:var(--amber)}.badge-blue{background:var(--blue-dim);color:var(--blue)}.badge-red{background:var(--red-dim);color:var(--red)}.badge-purple{background:var(--purple-dim);color:var(--purple)}.badge-orange{background:var(--orange-dim);color:var(--orange)}
.btn{display:block;width:100%;padding:13px;font-size:14px;font-weight:500;font-family:var(--sans);border-radius:var(--r-sm);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;text-align:center;transition:all .15s;margin-bottom:8px}
.btn:active{transform:scale(.98);opacity:.8}
.btn-primary{background:var(--accent);color:#0a1a0f;border-color:var(--accent);font-weight:600}
.btn-orange{background:var(--orange);color:#1a0800;border-color:var(--orange);font-weight:600}
.btn-sm{width:auto;display:inline-flex;align-items:center;gap:4px;padding:7px 12px;font-size:12px;margin-bottom:0}
.btn-ghost{border-color:transparent;color:var(--muted)}.btn-danger{border-color:var(--red);color:var(--red)}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.prog-track{height:4px;background:var(--surf2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.section-label{font-size:10px;font-family:var(--mono);font-weight:500;color:var(--muted);letter-spacing:.1em;margin:16px 0 8px;text-transform:uppercase}
.divider{height:1px;background:var(--border);margin:12px 0}
.alert{border-radius:var(--r-sm);padding:10px 12px;font-size:12px;line-height:1.6;margin-bottom:10px}
.alert-amber{background:var(--amber-dim);color:var(--amber)}.alert-blue{background:var(--blue-dim);color:var(--blue)}.alert-green{background:var(--accent-dim);color:var(--accent)}.alert-red{background:var(--red-dim);color:var(--red)}.alert-purple{background:var(--purple-dim);color:var(--purple)}.alert-orange{background:var(--orange-dim);color:var(--orange)}
/* Exercise cards */
.ex-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.ex-card.done{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
.ex-card.away-ex{border-color:rgba(251,146,60,.25);background:rgba(251,146,60,.04)}
.ex-name{font-size:14px;font-weight:500;color:var(--text)}.ex-detail{font-size:12px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.ex-note{font-size:12px;color:var(--muted);background:var(--surf2);border-radius:var(--r-sm);padding:8px 10px;margin:8px 0;line-height:1.5}
.ex-rec{font-size:12px;color:var(--accent);background:var(--accent-dim);border-radius:var(--r-sm);padding:7px 10px;margin:6px 0;display:flex;align-items:center;gap:6px}
.ex-away-rec{font-size:12px;color:var(--orange);background:var(--orange-dim);border-radius:var(--r-sm);padding:7px 10px;margin:6px 0}
.ss-badge{font-size:10px;font-family:var(--mono);background:var(--blue-dim);color:var(--blue);border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle}
.away-badge{font-size:10px;font-family:var(--mono);background:var(--orange-dim);color:var(--orange);border-radius:4px;padding:1px 6px;margin-left:5px;vertical-align:middle}
.help-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);flex-shrink:0;margin-left:6px;vertical-align:middle}
/* Set logging */
.sets-area{margin-top:10px}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.set-label{font-size:11px;font-family:var(--mono);color:var(--muted);width:38px;flex-shrink:0}
.set-input{flex:1;padding:8px 6px;font-size:14px;font-family:var(--mono);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);text-align:center;min-width:0;-webkit-appearance:none}
.set-input:focus{outline:none;border-color:var(--border2)}.set-input::placeholder{color:var(--muted);font-size:11px}
.set-input.on-target{border-color:rgba(74,222,128,.5)}.set-input.off-target{border-color:rgba(248,113,113,.4)}
.set-check{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted);transition:all .15s;font-size:16px}
.set-check.done{background:var(--accent);border-color:var(--accent);color:#0a1a0f}
.timer-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--muted)}
/* Timer */
.timer-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:10px 0;text-align:center}
.timer-display{font-size:44px;font-weight:300;font-family:var(--mono);color:var(--text);letter-spacing:-2px;margin:8px 0}
.timer-display.done{color:var(--accent)}.timer-display.warn{color:var(--amber)}
.timer-btns{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
/* Warmup */
.warmup-box{background:var(--surf2);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px}
.warmup-label{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.08em;margin-bottom:4px}
.warmup-text{font-size:12px;color:var(--text);line-height:1.6}
/* Away mode toggle */
.away-toggle-wrap{background:var(--orange-dim);border:1px solid rgba(251,146,60,.3);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.away-toggle-label{font-size:13px;font-weight:500;color:var(--orange)}
.toggle-switch{width:44px;height:26px;border-radius:13px;background:var(--surf2);border:1px solid var(--border2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-switch.on{background:var(--orange);border-color:var(--orange)}
.toggle-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-switch.on .toggle-knob{transform:translateX(18px)}
/* Away mode banner */
.away-banner{background:var(--orange-dim);border:1px solid rgba(251,146,60,.3);border-radius:var(--r);padding:14px;margin-bottom:12px}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:10px 0}
.cal-hdr{text-align:center;font-size:10px;font-family:var(--mono);color:var(--muted);padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono);color:var(--muted);cursor:default;position:relative}
.cal-day.has-workout{background:var(--surf2);color:var(--text);cursor:pointer}
.cal-day.completed{background:rgba(74,222,128,.15);color:var(--accent)}
.cal-day.completed-away{background:rgba(251,146,60,.15);color:var(--orange)}
.cal-day.today-workout{background:var(--accent);color:#0a1a0f;font-weight:600}
.cal-day.today-rest{border:1px solid var(--border2);color:var(--muted)}
.cal-day.missed{background:rgba(248,113,113,.15);color:var(--red)}
.cal-day.future{opacity:.4}
/* Week grid */
.week-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0}
.week-cell{aspect-ratio:1;border-radius:var(--r-sm);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--muted);background:var(--surf)}
.week-cell .wn{font-size:14px;font-weight:600;font-family:var(--mono)}
.week-cell.current{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.week-cell.done{border-color:rgba(74,222,128,.3);color:var(--accent);background:rgba(74,222,128,.06)}
.week-cell.deload{border-color:rgba(96,165,250,.3);color:var(--blue);background:var(--blue-dim)}
/* Stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-num{font-size:26px;font-weight:600;font-family:var(--mono);color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
/* Bar chart */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-label{font-size:10px;font-family:var(--mono);color:var(--muted);width:42px;text-align:right;flex-shrink:0}
.bar-outer{flex:1;height:14px;background:var(--surf2);border-radius:3px;overflow:hidden}
.bar-inner{height:100%;background:var(--accent);border-radius:3px;transition:width .5s ease}
.bar-val{font-size:10px;font-family:var(--mono);color:var(--muted);width:24px;flex-shrink:0}
/* Phase tabs */
.phase-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--muted);background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.phase-tab.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(74,222,128,.3)}
/* 1RM */
.rm-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.rm-lift-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px}
.rm-inputs{display:flex;gap:8px;margin-bottom:10px}
.rm-input-wrap{flex:1;display:flex;flex-direction:column;gap:4px}
.rm-input-label{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.rm-input{width:100%;padding:9px 10px;font-size:15px;font-family:var(--mono);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);text-align:center;-webkit-appearance:none}
.rm-input:focus{outline:none;border-color:var(--border2)}
.rm-result{background:var(--accent-dim);border-radius:var(--r-sm);padding:10px 12px}
.rm-1rm{font-size:22px;font-weight:600;font-family:var(--mono);color:var(--accent)}
.rm-history{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
/* Mobility checklist */
.mob-check-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;transition:all .2s}
.mob-check-card.checked{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
.mob-check-row{display:flex;align-items:center;gap:12px;cursor:pointer}
.mob-checkbox{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:14px}
.mob-check-card.checked .mob-checkbox{background:var(--accent);border-color:var(--accent);color:#0a1a0f}
.mob-check-name{font-size:14px;font-weight:500;color:var(--text);flex:1}
.mob-check-meta{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:2px}
.mob-check-card.checked .mob-check-name{color:var(--accent)}
.mob-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.mob-check-card.expanded .mob-detail{display:block}
.mob-steps{list-style:none;counter-reset:step}
.mob-steps li{counter-increment:step;display:flex;gap:8px;margin-bottom:8px;font-size:12px;color:var(--muted);line-height:1.5}
.mob-steps li::before{content:counter(step);width:18px;height:18px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);color:var(--accent);flex-shrink:0;margin-top:1px}
.mob-ring{width:56px;height:56px;flex-shrink:0}
/* Reference panel */
.ref-panel{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(0,0,0,.7);opacity:0;pointer-events:none;transition:opacity .2s}
.ref-panel.open{opacity:1;pointer-events:all}
.ref-inner{background:var(--surf);border-radius:var(--r) var(--r) 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease}
.ref-panel.open .ref-inner{transform:translateY(0)}
.ref-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px}
.ref-detail{font-size:12px;font-family:var(--mono);color:var(--muted);margin-bottom:14px}
.ref-section{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 8px}
.ref-steps{list-style:none;counter-reset:rs}
.ref-steps li{counter-increment:rs;display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:var(--text);line-height:1.6}
.ref-steps li::before{content:counter(rs);width:22px;height:22px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono);color:var(--accent);flex-shrink:0;margin-top:2px}
.ref-cue{background:var(--surf2);border-radius:var(--r-sm);padding:10px 12px;font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.6}
.ref-mistake{background:var(--red-dim);border-radius:var(--r-sm);padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:8px;line-height:1.5}
.ref-link{display:flex;align-items:center;gap:8px;background:var(--blue-dim);border-radius:var(--r-sm);padding:10px 12px;font-size:13px;color:var(--blue);text-decoration:none;margin-bottom:8px}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surf);border-radius:var(--r) var(--r) 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;color:var(--text)}
input[type=date],input[type=number],input[type=text]{font-family:var(--mono);background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);padding:10px 12px;font-size:14px;width:100%}
input[type=date]:focus,input[type=number]:focus{outline:none;border-color:var(--border2)}
input[type=date]{color-scheme:dark}
.complete-btn{background:var(--accent);color:#0a1a0f;border:none;border-radius:var(--r-sm);padding:15px;font-size:15px;font-weight:600;font-family:var(--sans);width:100%;cursor:pointer;margin-top:14px}
.complete-btn:active{transform:scale(.98)}
.missed-banner{background:var(--red-dim);border:1px solid rgba(248,113,113,.3);border-radius:var(--r);padding:14px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="screen-today" class="screen active"></div>
    <div id="screen-calendar" class="screen"></div>
    <div id="screen-strength" class="screen"></div>
    <div id="screen-progress" class="screen"></div>
    <div id="screen-mobility" class="screen"></div>
  </div>
  <nav id="nav">
    <button class="nav-item active" onclick="showScreen('today',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Today
    </button>
    <button class="nav-item" onclick="showScreen('calendar',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar
    </button>
    <button class="nav-item" onclick="showScreen('strength',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4M6 9h12M6 15h12"/></svg>1RM
    </button>
    <button class="nav-item" onclick="showScreen('progress',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Progress
    </button>
    <button class="nav-item" onclick="showScreen('mobility',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>Mobility
    </button>
  </nav>
</div>

<div id="ref-panel" class="ref-panel" onclick="if(event.target===this)closeRef()">
  <div class="ref-inner" id="ref-inner"></div>
</div>

<!-- Modals -->
<div id="modal-setup" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">Set up your program</div>
    <div style="margin-bottom:12px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Program start date</div>
      <input type="date" id="setup-date" style="margin-bottom:12px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Training days (pick 3)</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px" id="day-picker"></div>
    </div>
    <button class="btn btn-primary" onclick="saveSetup()">Start program</button>
  </div>
</div>

<div id="modal-bw" class="modal-overlay" onclick="if(event.target===this)closeModal('modal-bw')">
  <div class="modal">
    <div class="modal-title">Log bodyweight</div>
    <div style="margin-bottom:12px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Weight (kg)</div>

// ─── AWAY MODE: REP CALIBRATION ───────────────────────────────────────────────
// Given relative strength ratio (1RM / bodyweight), return rep targets
function getAwayReps(pattern, ratio) {
  // ratio buckets: <0.75=building, 0.75-1.0=intermediate, 1.0-1.25=strong, >1.25=very strong
  const targets = {
    push_h:    [[10,3],[15,3],[20,4],[25,4]],  // [reps, sets]
    push_v:    [[8,3], [12,3],[15,3],[18,3]],
    pull_h:    [[10,3],[12,3],[15,3],[20,4]],
    pull_v:    [[8,3], [10,3],[12,3],[15,4]],
    hinge:     [[10,3],[15,3],[20,3],[25,3]],
    squat:     [[12,3],[15,3],[20,4],[25,4]],
    core:      [[12,3],[15,3],[20,3],[20,3]],
    isolation: [[15,3],[20,3],[25,3],[30,3]],
  };
  const t = targets[pattern] || targets.core;
  if (ratio < 0.75) return t[0];
  if (ratio < 1.0)  return t[1];
  if (ratio < 1.25) return t[2];
  return t[3];
}

function getStrengthLevel(ratio) {
  if (ratio < 0.75) return {label:'Building',color:'var(--blue)'};
  if (ratio < 1.0)  return {label:'Intermediate',color:'var(--accent)'};
  if (ratio < 1.25) return {label:'Strong',color:'var(--amber)'};
  return {label:'Very strong',color:'var(--orange)'};
}

// Get the best 1RM ratio for a given exercise pattern
function getRatioForPattern(pattern) {
  const bw = getLatestBW();
  if (!bw) return null;
  const rmMap = {
    push_h: 'bench', push_v: 'ohp',
    pull_h: 'deadlift', pull_v: 'pullup',
    hinge: 'deadlift', squat: 'squat',
    core: null, isolation: null,
  };
  const rmId = rmMap[pattern];
  if (!rmId) return null;
  const rm = getRM(rmId);
  if (!rm) return null;
  return rm / bw;
}

function getAwayExercise(ex) {
  const sub = AWAY_SUBS[ex.n];
  if (!sub) return null;
  const ratio = getRatioForPattern(sub.pattern);
  const [reps, sets] = ratio ? getAwayReps(sub.pattern, ratio) : [15, 3];
  const chosenSub = sub.subs[0]; // primary substitution
  return {
    n: chosenSub.n,
    sets,
    reps: `${reps}`,
    rest: 60,
    load: 'BW',
    note: chosenSub.note,
    alts: sub.subs.slice(1),
    pattern: sub.pattern,
    ratio,
    original: ex.n,
    isAway: true,
  };
}

  "DB Incline Chest Fly":{steps:["Set bench to 30–45°. Hold dumbbells above chest, palms facing each other, slight elbow bend.","Lower dumbbells out to sides in a wide arc — feel the chest stretching.","Stop when you feel a strong but comfortable stretch.","Squeeze dumbbells back together at top."],cue:"The weight should be light enough to feel every inch of the movement.",mistake:"Straightening elbows at the bottom — shifts load to bicep tendons.",search:"incline dumbbell chest fly form"},
  "Pallof Press":{steps:["Set cable or band at chest height. Stand side-on.","Hold handle at chest with both hands. Feet shoulder-width.","Press handle straight out — arms fully extended.","Hold 1–2 seconds. Resist cable pulling you toward anchor.","Return to chest. Torso should not rotate at all."],cue:"The work happens during the hold. Don't rush through the extension.",mistake:"Rotating your torso toward the cable. Nothing moves except your arms.",search:"pallof press anti rotation core"},
  "Single Leg RDL (DB)":{steps:["Stand on one leg with slight bend in knee.","Hold dumbbell in opposite hand to working leg.","Hinge at hip — chest forward, free leg back simultaneously.","Lower until strong hamstring stretch.","Drive through heel, squeeze glute to return."],cue:"Your body should form a straight line from head to raised heel at the bottom.",mistake:"Letting lower back round as you descend.",search:"single leg romanian deadlift dumbbell"},
  "Goblet Squat":{steps:["Hold heavy dumbbell vertically at chest height — both hands cupping top plate.","Feet shoulder-width, toes turned out.","Brace core and sit down between heels — not backward.","Elbows track inside knees at bottom. Torso upright.","Drive through full foot to stand."],cue:"The goblet position forces you to stay upright. Let the weight teach you.",mistake:"Caving knees inward at bottom. Push elbows against inner knees.",search:"goblet squat form tutorial"},
  "DB Arnold Press":{steps:["Sit on bench. Hold dumbbells at chin height, palms facing you, elbows bent.","As you press up, rotate palms forward so at top they face away.","Arms fully extended at top.","Reverse rotation as you lower — returning to palms-facing-you.","Move slowly — rotation should take the full range of press."],cue:"The rotation adds rotator cuff training, making this safer than strict military press.",mistake:"Rushing the rotation — should be smooth and continuous.",search:"arnold press dumbbell form"},
  "Chest-Supported DB Row":{steps:["Set bench to 45°. Lie face-down — chest and belly on pad, feet on floor.","Hold dumbbells hanging straight down, arms extended.","Row both dumbbells toward hips simultaneously, elbows close to sides.","Squeeze shoulder blades together at top. Hold 1 second.","Lower with control to full extension."],cue:"Because bench supports torso, you can go heavier with zero lower back involvement.",mistake:"Flaring elbows out to 90°. Keep them close to ribs.",search:"chest supported dumbbell row form"},
  "Farmer's Walk (Suitcase Carry)":{steps:["Pick up heavy dumbbell in one hand.","Stand tall — don't lean toward the weight. Torso vertical.","Walk 30m with controlled, even steps.","Keep shoulder on loaded side packed down — don't shrug.","Core braces laterally the entire time."],cue:"If torso tilts toward the weight, it's too heavy. Start lighter.",mistake:"Leaning away from the weight instead of staying tall.",search:"suitcase carry farmer walk exercise"},
  "Weighted Wide Grip Pull-Up":{steps:["Attach weight via dip belt or hold dumbbell between legs.","Hang with overhand wide grip, fully extended.","Pull until chin clears bar — leading with elbows.","Pause at top for 1 second.","Lower with complete control — 3 seconds. Full extension at bottom."],cue:"Added weight makes full ROM even more critical. A sloppy rep with load is worse than no rep.",mistake:"Adding too much weight and losing full range.",search:"weighted pull up form"},
  // Bodyweight substitutions also get reference cards
  "Push-Up":{steps:["Hands slightly wider than shoulders, body in a straight line.","Brace core and squeeze glutes before you start.","Lower until chest nearly touches the floor — full range every rep.","Press back to lockout."],cue:"The tempo is what makes this challenging without load. 3 seconds down.",mistake:"Sagging hips or a piked position. Maintain a rigid body throughout.",search:"perfect push up form"},
  "Archer Push-Up":{steps:["Start in a wide push-up position.","Lower toward one hand, extending the other arm out wide (straight).","At the bottom, one arm is fully bent, one is nearly straight.","Press back to start, then repeat to the other side."],cue:"The wide arm provides some resistance — think of it as a partial single arm push-up.",mistake:"Not going low enough on the bent-arm side.",search:"archer push up exercise"},
  "Slow Eccentric Push-Up":{steps:["Start in standard push-up position.","Lower yourself over exactly 5 seconds — count slowly.","Pause for 1 second at the bottom.","Press back up as fast as you can with good form."],cue:"The 5-second lowering phase is where the strength adaptation happens.",mistake:"Rushing the descent. The slow lowering is the point.",search:"slow eccentric push up"},
  "Pike Push-Up":{steps:["Start in a push-up position but walk feet toward hands until hips are high.","Body forms an inverted V shape.","Bend elbows and lower your head toward the floor between your hands.","Press back to the inverted V."],cue:"The higher your hips, the more shoulder loading. Adjust to your strength level.",mistake:"Letting hips drop during the movement.",search:"pike push up shoulder exercise"},
  "Incline Push-Up (feet elevated)":{steps:["Place feet on a chair, bed, or stable surface.","Hands on floor, slightly wider than shoulder-width.","Lower chest toward floor with control.","Press back up to lockout."],cue:"The higher the surface, the more upper chest and shoulder loading.",mistake:"Allowing the lower back to sag. Maintain a straight body.",search:"feet elevated push up incline"},
  "Table/Desk Row":{steps:["Find a sturdy table. Lie under it with chest below the edge.","Grip the edge of the table with both hands, overhand or underhand.","Hang with arms extended — let shoulder blades spread forward (full stretch).","Pull your chest up to the table edge, squeezing shoulder blades together.","Lower with control. Full extension at the bottom."],cue:"The table row is the best bodyweight horizontal pull. Go as heavy a table as possible — the higher it is, the easier it is.",mistake:"Not going to full stretch at the bottom. The range of motion is the exercise.",search:"table row bodyweight exercise"},
  "Towel Door Row":{steps:["Loop a sturdy towel around a door handle. Hold one end in each hand.","Lean back away from the door, feet close to the door, body at an angle.","Pull yourself toward the door by rowing your elbows back.","Squeeze shoulder blades at the end. Lower with control."],cue:"The more horizontal your body, the harder it is. Adjust by walking feet closer to the door.",mistake:"Using a weak towel or door handle. Test it first — safety first.",search:"towel door row bodyweight pull"},
  "Single Leg RDL (bodyweight)":{steps:["Stand on one leg with a slight bend in the knee.","Arms forward for counterbalance, or hands on hips.","Hinge at the hip — chest forward, free leg back.","Lower until you feel a strong hamstring stretch.","Drive through heel, squeeze glute to stand."],cue:"4 seconds down. The slow tempo compensates for the lack of load.",mistake:"Rushing the movement. Without weight, tempo is everything.",search:"single leg RDL bodyweight"},
  "Good Morning (bodyweight)":{steps:["Stand with hands behind your head, elbows wide.","Feet shoulder-width, slight knee bend.","Hinge at hips — send chest forward, hips back.","Lower until you feel a strong hamstring stretch — roughly 45° torso angle.","Drive hips forward to stand."],cue:"Think of it as a squat where the movement is in the hips, not the knees.",mistake:"Rounding the lower back. Keep a neutral spine throughout.",search:"good morning exercise bodyweight"},
  "Bulgarian Split Squat (bodyweight)":{steps:["Stand in front of a chair, bed, or bench. Rear foot on the surface.","Hands on hips or clasped in front.","Lower hips straight down — not forward. Torso upright.","Front thigh parallel to floor at bottom.","Drive through front heel to return."],cue:"Higher rep target compensates for lack of load. Focus on depth every rep.",mistake:"Leaning too far forward. Keep chest tall.",search:"bodyweight bulgarian split squat"},
  "Slow Bodyweight Squat":{steps:["Feet shoulder-width, toes out slightly.","Arms out front for counterbalance.","5 seconds down — count slowly. Sit into your hips.","2 second pause at the bottom.","1 second up."],cue:"8 seconds per rep total. The tempo turns a simple squat into a serious exercise.",mistake:"Speeding up. The whole point is the time under tension.",search:"slow tempo bodyweight squat"},
  "Diamond Push-Up":{steps:["Place hands close together under your chest, index fingers and thumbs touching.","Body in a straight line. Core braced.","Lower until chest nearly touches your hands.","Press back to lockout."],cue:"Keep elbows tracking along your body — they should brush your ribcage as you lower.",mistake:"Flaring elbows out. That turns it back into a chest exercise.",search:"diamond push up triceps"},
  "Dead Bug":{steps:["Lie on your back, arms pointing straight up, knees bent at 90°.","Press lower back HARD into the floor. Maintain this contact throughout.","Slowly lower opposite arm and leg simultaneously — both hovering above floor.","Return, then switch sides."],cue:"The moment your lower back leaves the floor, the exercise has failed. Stop and reset.",mistake:"Moving too fast. Slow and controlled — the core is the focus, not the limbs.",search:"dead bug core exercise"},
  "Bird Dog":{steps:["Start on all fours — hands under shoulders, knees under hips.","Brace core gently.","Extend right arm forward and left leg back simultaneously.","Hold 2 seconds at full extension. Body in a straight line.","Return with control, then switch sides."],cue:"Keep your hips perfectly level throughout. No rotation.",mistake:"Letting the hips rotate or the lower back arch.",search:"bird dog exercise core stability"},
  "Hollow Body Hold":{steps:["Lie on your back. Press lower back into floor.","Raise legs to 45° and arms overhead — both off the floor.","Hold this position. Keep breathing.","Lower back must stay pressed into the floor throughout."],cue:"If lower back lifts, raise your legs higher or bend your knees to make it easier.",mistake:"Letting the lower back arch away from the floor.",search:"hollow body hold core exercise"},
  "Prone Y Raise":{steps:["Lie face down on the floor or a mat.","Arms extended in a Y shape — roughly 45° from overhead.","Thumbs pointing up.","Lift arms using shoulder blades only — no torso movement.","Hold 1–2 seconds at top. Lower slowly."],cue:"This is the T and Y from your IYTW routine — same movement, rear delt and rotator cuff focus.",mistake:"Shrugging shoulders as you lift. Shoulder blades drive the movement.",search:"prone Y raise rear delt"},
  // Mobility exercises
  "Seated Upper Trap Stretch":{steps:["Sit upright. Place one hand behind your lower back.","With other hand, gently pull head toward shoulder — ear to shoulder.","Hold 30 seconds. Breathe deeply.","Switch sides."],cue:"Don't pull hard. A gentle nudge and your breathing does the releasing.",mistake:"Rotating your chin down or up. Keep gaze forward, just lateral tilt.",search:"upper trapezius stretch seated"},
  "Active Lats Stretch":{steps:["Kneel on floor in front of a bench or box at hip height.","Place both hands on bench, elbows straight.","Walk knees back until arms extended overhead.","Exhale and let chest drop toward floor, arms straight.","Hold 2 seconds at bottom, then return."],cue:"The exhale is what creates the stretch. Breathe in at top, exhale as you drop.",mistake:"Bending elbows as you drop. Arms stay locked straight.",search:"active lats stretch exercise"},
  "Bent Arm Chest Stretch":{steps:["Stand in a doorframe. Raise arm to 90°, elbow bent.","Place forearm against the frame.","Slowly rotate body away until you feel the chest stretch.","Hold 30 seconds. Breathe into the stretch.","Switch sides."],cue:"Try at different heights — 90°, 110°, 70°. Each hits a different part of the chest.",mistake:"Rushing through. Hold for the full time and breathe.",search:"doorway chest stretch bent arm"},
  "Wall Supported Hip Flexor Stretch":{steps:["Kneel facing a wall. Place one knee close to wall.","Other foot flat on floor in front.","Tilt pelvis backward (posterior pelvic tilt) — flatten lower back.","Hold this position, lean into wall slightly.","Hold 40–45 seconds."],cue:"The posterior pelvic tilt is what creates the stretch. Without it you're just kneeling.",mistake:"Arching the lower back. Keep lower back flat.",search:"wall hip flexor stretch kneeling"},
  "Cat-Cow":{steps:["Start on all fours — hands under shoulders, knees under hips.","Cat: Exhale fully. Round spine toward ceiling, tuck chin and tailbone.","Cow: Inhale deeply. Drop belly toward floor, lift gaze and tailbone.","Move continuously and smoothly — let breath drive the rhythm."],cue:"The breath is the exercise. Exhale creates Cat, inhale creates Cow.",mistake:"Moving too fast. Slow down and feel each vertebra.",search:"cat cow spine exercise"},
  "Adductor Rockback":{steps:["Start on all fours. Spread one knee wide out to side.","Slowly rock hips backward toward heel on extended side.","Feel inner thigh (adductor) of wide leg stretching.","Hold at deepest point for 2 seconds, then rock forward."],cue:"Only go as far as you can without pain.",mistake:"Letting lower back round as you rock back.",search:"adductor rockback stretch exercise"},
  "Frog Hip Internal Rotation":{steps:["Start on all fours. Walk knees wide — wider than hip width. Toes pointing out.","Lower forearms to floor for support.","Alternate rotating each leg inward — drop foot toward midline.","Goal is to get shin closer to flat on the floor.","Move slowly and breathe into the stretch."],cue:"This trains hip internal rotation, often very stiff in people who sit a lot.",mistake:"Forcing the range. Move only as far as your hip allows without lower back compensation.",search:"frog hip internal rotation stretch"},
  "Half Kneeling Long Split":{steps:["Kneel on one knee on a pad. Front foot flat on floor in front.","Keep torso tall and upright. Brace core lightly.","Shift weight forward slightly until stretch in front of rear hip.","Hold 40–45 seconds.","Switch sides."],cue:"Keep back glute squeezed. This increases the hip flexor stretch.",mistake:"Leaning forward with torso. Stretch comes from hip position.",search:"half kneeling hip flexor stretch"},
  "90/90 Hip Switch":{steps:["Sit on floor with both knees bent at 90°. One knee forward, one to side.","Keep torso tall.","Rotate hips to switch legs to the opposite 90/90 position.","Use hands lightly for support.","Repeat 10 times on each side."],cue:"This trains both internal and external hip rotation simultaneously.",mistake:"Letting torso collapse as you switch. Keep chest up.",search:"90 90 hip switch mobility"},
  // Away mode substitution exercise references
  "Cable Rope Tricep Extension":{steps:["Attach a rope to a high cable pulley.","Grip the rope with both hands, palms facing each other. Elbows tucked into your sides.","Push the rope down and apart until arms are fully extended.","Pause at the bottom — full extension. Return slowly."],cue:"Keep your elbows locked in position throughout. Only your forearms move.",mistake:"Letting elbows flare out or drift forward. This turns it into a shoulder exercise.",search:"cable rope tricep extension form"},
  "Deficit Push-Up":{steps:["Place hands on two books, dumbbells, or stable elevated surfaces.","Set up in a standard push-up position — body in a straight line.","Lower yourself below the level of your hands — this creates a deeper range of motion.","Press back to lockout."],cue:"The extra range at the bottom is what makes this harder — control it fully.",mistake:"Letting your hips sag as you go deeper. Maintain a rigid plank throughout.",search:"deficit push up exercise"},
  "Slow Push-Up with Pause":{steps:["Start in a standard push-up position.","Lower yourself over 3 seconds to the bottom.","Pause for 3 seconds at the bottom — chest barely off the floor.","Press back to lockout."],cue:"The pause at the bottom eliminates elastic energy — every rep is pure strength.",mistake:"Collapsing at the bottom. Maintain tension throughout the pause.",search:"pause push up exercise"},
  "Chest Squeeze Hold":{steps:["Stand or sit upright. Press your palms firmly together at chest height, elbows out to sides.","Squeeze your palms together as hard as possible — create maximum tension.","Hold for 5 seconds. Release briefly, then repeat.","Focus on feeling the contraction across your inner chest."],cue:"This is an isometric exercise. Maximum tension is the goal — not movement.",mistake:"Letting your shoulders shrug up. Keep them down and back.",search:"chest squeeze isometric exercise"},
  "Wall Handstand Hold":{steps:["Stand facing away from a wall. Place hands on floor about 30 cm from the wall.","Kick one leg up and follow with the other, letting feet rest against the wall.","Hold the position with straight arms. Core braced, hips stacked over shoulders.","Build up hold time gradually — 10 seconds to start."],cue:"This builds shoulder stability and overhead pressing strength without any equipment.",mistake:"Allowing your back to arch excessively. Keep your core tight.",search:"wall handstand hold exercise"},
  "Pike Push-Up with Rotation":{steps:["Start in a pike push-up position — hips high, body in an inverted V.","Perform a pike push-up, lowering your head toward the floor.","As you press back up, rotate one arm out to the side — reaching for the ceiling.","Return to pike position. Alternate the rotation each rep."],cue:"The rotation mimics the Arnold press movement pattern. Go slow and controlled.",mistake:"Losing the pike position during the rotation. Re-establish before the next rep.",search:"pike push up rotation exercise"},
  "Table/Desk Row (narrow grip)":{steps:["Find a sturdy table. Lie under it with chest below the edge.","Grip the edge with hands close together — similar to a close-grip row.","Hang with arms extended — let shoulder blades spread forward.","Pull your chest up to the table, elbows tracking close to your sides.","Lower with control."],cue:"Narrow grip emphasises your lower traps and lats — the same target as close-grip cable row.",mistake:"Letting elbows flare wide. Keep them tight to your body throughout.",search:"narrow grip table row bodyweight"},
  "Prone Superman Row":{steps:["Lie face down on the floor. Arms in a rowing position — elbows bent, hands near your chest.","Lift your chest slightly off the floor.","Drive your elbows back and squeeze your shoulder blades together.","Hold 2 seconds at the top. Lower slowly.","This is a light exercise — use it as a shoulder blade activation tool."],cue:"Focus on the squeeze at the top. The range of motion is small but the activation is real.",mistake:"Lifting your feet — this turns it into a superman. Keep toes on the floor.",search:"prone row shoulder blade squeeze"},
  "Towel Door Row (vertical)":{steps:["Loop a sturdy towel over the top of a door. Hold one end in each hand.","Stand facing the door. Lean back at an angle, arms extended above you.","Pull yourself toward the door by driving your elbows down and back.","Squeeze your lats at the top of the movement.","Lower with control."],cue:"The more vertical your body angle, the more it targets the lats — like a lat pulldown.",mistake:"Using a weak towel or unsecured door. Test stability before loading it.",search:"towel door pull exercise lat"},
  "Find a bar":{steps:["Look for: park bars, playground equipment, tree branches (thick and horizontal), garage beams, or a hotel gym.","Even a low bar where you can do Australian pull-ups (body at an angle) counts.","10 seconds of hanging or a few partial reps is better than skipping the movement entirely."],cue:"The pulling pattern is the most important to preserve while travelling. Prioritise finding a bar.",mistake:"Giving up too quickly. Most parks, playgrounds, and hotel gyms have something usable.",search:"outdoor pull up bar workout"},
  "Slow Eccentric Door Row":{steps:["Loop a sturdy towel around a door handle. Lean back away from door.","Pull yourself toward the door quickly (1 second).","Lower yourself away from the door over exactly 5 seconds — slow and controlled.","Feel the tension through the back and arms during the lowering phase."],cue:"The 5-second lowering phase is where the strength adaptation happens — it's harder than it sounds.",mistake:"Rushing the eccentric. Count slowly — one-one-thousand, two-one-thousand.",search:"slow eccentric row bodyweight"},
  "Towel Door Row (single arm)":{steps:["Loop a towel around a door handle. Hold with one hand only.","Lean back away from the door at an angle — more lean = harder.","Pull yourself toward the door with one arm, elbow driving back.","Squeeze shoulder blade at the top. Lower with control.","Complete all reps on one side, then switch."],cue:"Keep your body square — resist the urge to rotate toward the working arm.",mistake:"Rotating your torso to compensate. This turns it into a rotation exercise, not a row.",search:"single arm towel row bodyweight"},
  "Prone I Raise":{steps:["Lie face down on the floor. One arm extended straight overhead — I position.","Thumb pointing up.","Lift the arm using your shoulder blade — not by shrugging.","Hold 1–2 seconds at the top. Lower slowly.","Complete all reps on one side, then switch."],cue:"This isolates the lower trap and lat — the same muscles the lat pulldown targets.",mistake:"Shrugging the shoulder as you lift. The shoulder blade drives the movement.",search:"prone I raise lat activation"},
  "Slow Good Morning":{steps:["Stand with feet shoulder-width apart. Hands behind head, elbows wide.","Take 4 seconds to hinge forward at the hips — send chest forward, hips back.","Keep a slight knee bend and a neutral spine throughout.","Pause when you feel a strong hamstring stretch.","Drive hips forward to stand — squeeze glutes at the top."],cue:"4 seconds down compensates for the lack of load. Tempo is everything without a barbell.",mistake:"Rounding the lower back. If your back rounds, you've gone too far.",search:"good morning exercise bodyweight"},
  "Suitcase Walk (with luggage)":{steps:["Pick up your travel bag or suitcase in one hand at your side.","Stand tall — don't lean toward the weight at all. Torso perfectly vertical.","Walk in a straight line for 30 metres.","Keep your shoulder on the loaded side packed down — resist the shrug.","Switch hands and repeat."],cue:"This is your farmer's walk. The luggage is the weight. The challenge is staying tall.",mistake:"Leaning toward the bag. If you're leaning, the bag is too heavy or your core needs more work.",search:"suitcase carry loaded walk"},
  "Single Leg Balance Hold":{steps:["Stand on one leg. Slight knee bend.","Hold for 30 seconds — eyes open first, eyes closed for a harder challenge.","Keep your hips level and your torso upright.","Switch legs and repeat."],cue:"Closing your eyes dramatically increases the difficulty by removing visual stabilisation.",mistake:"Letting your standing hip drop. Keep both hips level throughout.",search:"single leg balance hold exercise"},
  "Pistol Squat Progression":{steps:["Hold a door frame or wall for balance support.","Stand on one leg. Extend the other leg straight in front of you.","Slowly lower down on the working leg as far as control allows.","Use the door frame as little support as possible — just enough to stay balanced.","Drive through the heel to stand."],cue:"The goal is to reduce reliance on the support over time. Each session try to hold it a little less.",mistake:"Dropping too fast. The squat should be slow and controlled throughout.",search:"pistol squat progression beginner"},
  "Rear Foot Elevated Split Squat with Pause":{steps:["Place rear foot on a chair, bed, or bench. Front foot flat on floor.","Lower straight down — hips not forward.","At the bottom of the movement, pause for 3 seconds.","Drive through the front heel to stand."],cue:"The pause eliminates momentum and creates more time under tension — compensating for the lack of load.",mistake:"Using the pause as a rest. Stay engaged — keep the tension in your front leg throughout.",search:"pause split squat tempo exercise"},
  "Side Plank":{steps:["Lie on your side. Prop yourself up on one forearm — elbow under shoulder.","Stack your feet or stagger them for stability.","Lift your hips until your body forms a straight line from head to heels.","Hold. Keep breathing steadily."],cue:"Squeeze your glutes and brace your core. Think tall and long.",mistake:"Letting your hips sag or your top hip rotate forward.",search:"side plank exercise form"},
  "Lateral Lunge":{steps:["Stand with feet together. Hands clasped in front for balance.","Step wide to one side. Sit into that hip — bend the stepping knee.","Keep the other leg straight. Chest up.","Drive through the lunging heel to return to standing.","Alternate sides."],cue:"This builds adductor (inner thigh) strength through range — the same area as the Copenhagen plank.",mistake:"Letting the lunging knee cave inward. Push it out in line with your toes.",search:"lateral lunge exercise"},
  "Band Pull-Apart (with towel)":{steps:["Hold a towel with both hands at shoulder width, arms extended in front of you.","Pull both ends of the towel apart simultaneously — stretching it as wide as possible.","Squeeze your shoulder blades together at the end.","Return slowly. That's one rep."],cue:"Keep your arms straight throughout. This is a shoulder blade exercise, not an arm exercise.",mistake:"Bending your elbows as you pull. Arms stay locked straight.",search:"band pull apart rear delt exercise"},
  "Diamond Push-Up":{steps:["Place hands close together under your chest, index fingers and thumbs touching to form a diamond.","Body in a straight line. Core braced.","Lower until chest nearly touches your hands.","Press back to lockout."],cue:"Keep your elbows tracking along your body — they should brush your ribcage as you lower.",mistake:"Flaring elbows out — that turns it back into a chest exercise.",search:"diamond push up triceps"},
  "Close Grip Push-Up":{steps:["Place hands narrower than shoulder width — about hip width apart.","Set up in a standard push-up position. Body in a straight line.","Lower with control, elbows tracking close to your sides.","Press back to lockout."],cue:"Narrower hands increases tricep activation compared to a standard push-up.",mistake:"Flaring elbows out. They should stay within 30° of your torso.",search:"close grip push up triceps"},
  "Lateral Raise (water bottles)":{steps:["Fill two water bottles to the same level. Hold one in each hand at your sides.","Slight forward lean at the hips.","Raise both arms out to the sides, leading with your elbows.","Stop at shoulder height. Lower slowly over 3 seconds."],cue:"The slow lowering is where the muscle works hardest. Don't let gravity do it.",mistake:"Swinging or using momentum. If you need to swing, use lighter bottles.",search:"lateral raise water bottle exercise"},
  "Prone T Raise":{steps:["Lie face down on the floor. Arms extended straight out to the sides — T position.","Thumbs pointing up.","Lift both arms simultaneously using your shoulder blades — not by shrugging.","Hold 1–2 seconds at the top. Lower slowly."],cue:"Think of squeezing a pencil between your shoulder blades at the top.",mistake:"Shrugging your shoulders up toward your ears. Keep them down and packed.",search:"prone T raise rear delt exercise"},
  "Front Raise (water bottles)":{steps:["Fill two water bottles evenly. Hold one in each hand in front of your thighs, palms down.","Keep a slight bend in your elbows.","Raise both arms forward to shoulder height.","Pause at the top. Lower slowly over 2–3 seconds."],cue:"This works the front delt. Keep loads light — this muscle is already well-worked from pushing exercises.",mistake:"Swinging your torso back to raise the bottles. Lock your torso completely still.",search:"front raise water bottle exercise"},
  "Wall Scapular Depression":{steps:["Stand facing a wall. Raise both arms overhead and place hands flat against the wall.","Without bending your elbows, actively pull your shoulder blades downward.","Your body will rise very slightly. Hold 1 second.","Release back to start. Repeat 5 times."],cue:"This mimics the scapular depression from your bar hang exercise — use it when no bar is available.",mistake:"Bending the elbows or shrugging. Arms stay straight, shoulder blades drive the movement.",search:"wall scapular depression exercise"},
  "Wall Slide":{steps:["Stand with your back flat against a wall. Arms bent to 90°, forearms against the wall.","Slowly slide your arms up the wall — raising them overhead while keeping forearms in contact.","Slide back down. The challenge is keeping your forearms and lower back touching the wall."],cue:"This trains serratus anterior and overhead shoulder mobility simultaneously.",mistake:"Letting your lower back arch away from the wall as your arms rise.",search:"wall slide shoulder exercise"},
  // New mobility exercises
  "Deep Squat Hold":{steps:["Stand with feet shoulder-width apart, toes turned out 20–30°.","Hold a door frame, pole, or TRX strap with both hands for balance.","Descend into a full squat — hips below knees, heels flat on the floor.","Hold the position. Use the support to keep your chest upright.","Breathe steadily. Let your hips sink a little further with each exhale."],cue:"This is a diagnostic stretch as much as a mobility drill. Note which areas feel restricted — ankles, hips, or thoracic. That tells you where to focus.",mistake:"Rising onto your toes. If heels lift, your ankle mobility is the limiter — prioritise ankle circles.",search:"deep squat hold mobility"},
  "Ankle Circles":{steps:["Sit on a chair or lie on your back. Lift one foot off the floor.","Draw the largest circle you can with your toes — moving your ankle, not just your toes.","Complete 10 reps clockwise, then 10 counter-clockwise.","Switch feet. The goal is full range — front, side, back, and side."],cue:"Slow circles expose your stiffest directions. The direction that feels restricted is where you need the most work.",mistake:"Moving your whole leg instead of isolating the ankle. Lock the knee still.",search:"ankle circles mobility exercise"},
  "Thread the Needle":{steps:["Start on all fours — hands under shoulders, knees under hips. Back flat.","Inhale and reach one arm up toward the ceiling, rotating your chest open.","Exhale and thread that arm under your body, reaching to the opposite side.","Let your shoulder and ear lower toward the floor. Hold.","Inhale and reach back to the ceiling. That's one rep."],cue:"The movement is led by the chest, not the arm. Think of your sternum rotating, and the arm follows.",mistake:"Letting your hips rotate. Keep hips level and square — only the thoracic spine should rotate.",search:"thread the needle thoracic stretch"},
  "Thoracic Extension (Towel Roll)":{steps:["Roll up your yoga mat tightly, or roll a thick towel into a firm cylinder — this replaces a foam roller.","Place the roll horizontally on the floor. Sit in front of it, then lean back so the roll sits at your mid-back.","Support your head with hands behind it. Knees bent, feet flat on the floor.","Let your upper back drape over the roll. Breathe out fully and let the chest open toward the floor.","Take 5 slow deep breaths. Each exhale, let your chest drop a little further.","Shift the roll up 2–3 cm toward your shoulder blades and repeat."],cue:"A tightly rolled mat gives more intensity. A loosely rolled towel gives less. Start softer and work up.",mistake:"Letting your lower back arch aggressively. Only your thoracic (mid and upper) spine should be extending over the roll.",search:"thoracic extension towel roll floor"},
  "Shoulder CARs":{steps:["Stand or sit tall. Start with one arm hanging at your side.","Slowly move your arm through the largest possible circular range of motion — forward, up overhead, behind you, down, and back to start.","The slower you move, the more benefit. Think 8–10 seconds per full circle.","Reverse the direction. Complete all reps on one side, then switch."],cue:"CAR stands for Controlled Articular Rotation. You are training active strength through the full joint range — not just passively stretching. This is what protects the shoulder under load.",mistake:"Moving too fast or letting momentum carry the arm. Full conscious control at every point in the circle.",search:"shoulder CARs controlled articular rotation"},
  "Pigeon Pose":{steps:["From a lunge position, bring your front foot across your body so the shin is roughly parallel to the front of your mat.","Lower your back knee to the floor. Sink your hips toward the floor.","Keep your front foot flexed to protect the knee.","Hold upright or walk your hands forward and lower your chest toward the floor.","Breathe into the outer hip and glute."],cue:"The deeper your shin angle (more parallel to the mat), the more intense the stretch. Start with a more acute angle and gradually work toward parallel.",mistake:"Letting the front foot point straight — this puts stress on the knee. Keep it flexed and angled.",search:"pigeon pose hip stretch"},
  "World's Greatest Stretch":{steps:["Start in a lunge with right foot forward, left knee on the floor.","Place your right hand on the floor inside your right foot.","Rotate your upper body to the right — reach your right arm to the ceiling.","Look up at your hand. Hold 2 seconds.","Return hand to floor. That's one rep. Complete all reps on one side, then switch."],cue:"This single exercise trains hip flexor length, thoracic rotation, and hamstring mobility simultaneously. It's one of the most time-efficient mobility exercises that exists.",mistake:"Keeping the back knee down makes it easier — lift it for a bigger challenge. Don't let your raised arm just flop — actively reach.",search:"world's greatest stretch mobility"},

// ─── EXERCISE HISTORY HELPERS ─────────────────────────────────────────────────
// exHistory[exName] = [{date, week, sets:[{weight,reps}], bestWeight, bestReps, volume}]
function recordExerciseHistory(exName, sets, week){
  if(!S.exHistory) S.exHistory={};
  if(!S.exHistory[exName]) S.exHistory[exName]=[];
  const validSets = sets.filter(s=>s&&s.done&&(s.weight||s.reps));
  if(!validSets.length) return;
  const entry = {
    date: todayStr(), week,
    sets: validSets.map(s=>({weight:parseFloat(s.weight)||0, reps:parseInt(s.reps)||0})),
    bestWeight: Math.max(...validSets.map(s=>parseFloat(s.weight)||0)),
    bestReps: Math.max(...validSets.map(s=>parseInt(s.reps)||0)),
    volume: validSets.reduce((a,s)=>a+(parseFloat(s.weight)||1)*(parseInt(s.reps)||0),0)
  };
  // Remove existing entry for same date
  S.exHistory[exName] = S.exHistory[exName].filter(e=>e.date!==todayStr());
  S.exHistory[exName].push(entry);
  // Keep last 20 entries per exercise
  if(S.exHistory[exName].length>20) S.exHistory[exName]=S.exHistory[exName].slice(-20);
}

function getLastSession(exName){
  const hist = (S.exHistory[exName]||[]);
  if(hist.length<2) return null; // need at least 2 — today and a previous
  // Return most recent entry that isn't today
  const prev = [...hist].filter(e=>e.date!==todayStr()).sort((a,b)=>b.date.localeCompare(a.date));
  return prev[0]||null;
}

function getPR(exName){
  const hist = S.exHistory[exName]||[];
  if(!hist.length) return null;
  return hist.reduce((best,e)=>e.bestWeight>best.bestWeight?e:best, hist[0]);
}

// Epley formula: 1RM = weight × (1 + reps/30)
function calcEpley(weight, reps){
  const w=parseFloat(weight)||0, r=parseInt(reps)||0;
  if(w<=0||r<=0) return 0;
  if(r===1) return Math.round(w);
  return Math.round(w*(1+r/30));
}

// Auto-calculate 1RM from exercise history (best logged set per lift)
function autoCalcRM(liftId){
  // Find all exercises that map to this liftId
  const exNames = Object.keys(LIFT_TO_RM).filter(k=>LIFT_TO_RM[k]===liftId);
  let bestEstimate = 0;
  exNames.forEach(name=>{
    const hist = S.exHistory[name]||[];
    hist.forEach(entry=>{
      entry.sets.forEach(s=>{
        if(s.weight>0&&s.reps>0){
          const est = calcEpley(s.weight, s.reps);
          if(est>bestEstimate) bestEstimate=est;
        }
      });
    });
  });
  return bestEstimate||null;
}

function getRM(id){
  // Manual override takes priority, then auto-calc from history
  const rm=S.rm[id];
  if(rm&&rm.weight&&rm.reps) return calcEpley(parseFloat(rm.weight),parseInt(rm.reps));
  return autoCalcRM(id);
}

function isTimeBased(reps){

  const m=(reps||'').match(/(\d+)\s*sec/i);

// ─── SCHEDULE ─────────────────────────────────────────────────────────────────
function buildSchedule(){if(!S.startDate||!S.trainingDays)return[];const start=new Date(S.startDate+'T00:00:00');const days=[...S.trainingDays].sort((a,b)=>a-b);const sessions=[];let count=0;let d=new Date(start);let itr=0;while(count<48&&itr<500){itr++;const dow=d.getDay();if(days.includes(dow)){sessions.push({date:dateStr(d),week:Math.floor(count/3)+1,dayIdx:count%3,sessionIdx:count});count++;}d.setDate(d.getDate()+1);}return sessions;}
function getSchedule(){if(!S._sc||S._scS!==S.startDate||S._scD!==JSON.stringify(S.trainingDays)){S._sc=buildSchedule();S._scS=S.startDate;S._scD=JSON.stringify(S.trainingDays);}return S._sc;}
function getTodaySession(){return getSchedule().find(s=>s.date===todayStr())||null;}
function getNextPendingSession(){const t=todayStr();for(const s of getSchedule()){if(s.date>=t&&!isSessionDone(s.week,s.dayIdx))return s;}return null;}
function getMissedSessions(){const t=todayStr();return getSchedule().filter(s=>s.date<t&&!isSessionDone(s.week,s.dayIdx));}
function isSessionDone(w,d){return!!(S.logs[dayKey(w,d)]||{})._completed;}
function slideProgramForward(){const missed=getMissedSessions();if(!missed.length){closeModal('modal-missed');return;}const e=missed[0].date;const td=new Date(todayStr()+'T00:00:00'),ed=new Date(e+'T00:00:00');const diff=Math.round((td-ed)/86400000);const ns=new Date(S.startDate+'T00:00:00');ns.setDate(ns.getDate()+diff);S.startDate=dateStr(ns);S._sc=null;saveState();closeModal('modal-missed');renderToday();}

function getExRec(ex){const lid=LIFT_TO_RM[ex.n];if(!lid)return null;const pct=parsePct(ex.load);if(!pct)return null;const rm=getRM(lid);if(!rm)return null;return{kg:Math.round(rm*pct/2.5)*2.5,pct:Math.round(pct*100),rm};}
function needsRMRetest(){const next=getNextPendingSession();if(!next)return false;if(PHASE_CHANGE_WEEKS.includes(next.week)&&next.dayIdx===0){return!S.rm[`phase_retest_${next.week}`];}return false;}

// ─── TIMER — sticky floating bar, auto-starts on set tick ────────────────────
let timer={running:false,elapsed:0,target:0,iv:null,label:''};
let sessionStartTime=null;

function startTimer(secs,label){
  if(timer.iv)clearInterval(timer.iv);
  timer={running:true,elapsed:0,target:secs,iv:null,label:label||''};
  timer.iv=setInterval(()=>{
    timer.elapsed++;
    if(timer.elapsed>=timer.target){
      clearInterval(timer.iv);timer.running=false;
      try{const a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.6);o.start();o.stop(a.currentTime+0.6);}catch(e){}
      setTimeout(()=>{if(!timer.running){timer.target=0;renderStickyTimer();}},2500);
    }
    renderStickyTimer();
  },1000);
  renderStickyTimer();
}

function stopTimer(){
  if(timer.iv)clearInterval(timer.iv);
  timer={running:false,elapsed:0,target:0,iv:null,label:''};
  renderStickyTimer();
}

function renderStickyTimer(){
  let bar=document.getElementById('sticky-timer');
  if(!bar){bar=document.createElement('div');bar.id='sticky-timer';bar.style.cssText='position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:150';document.body.appendChild(bar);}
  if(!timer.target){bar.innerHTML='';return;}
  const rem=Math.max(0,timer.target-timer.elapsed);
  const m=Math.floor(rem/60),s=rem%60;
  const pct=Math.round(timer.elapsed/timer.target*100);
  const done=rem===0,warn=rem<=10&&rem>0;
  const col=done?'var(--accent)':warn?'var(--amber)':'var(--blue)';
  bar.innerHTML=`<div style="background:var(--surf);border-bottom:2px solid ${col};padding:7px 16px;display:flex;align-items:center;gap:10px">
    <div style="flex:1;height:3px;background:var(--surf2);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${col};border-radius:2px;transition:width .8s linear"></div></div>
    <span style="font-size:14px;font-family:var(--mono);font-weight:500;color:${col};min-width:40px;text-align:right">${done?'✓':m+':'+String(s).padStart(2,'0')}</span>
    ${timer.label?`<span style="font-size:10px;color:var(--muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${timer.label}</span>`:''}
    <button onclick="stopTimer()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 2px;line-height:1">×</button>
  </div>`;
}

// ─── SCREEN WAKE LOCK ──────────────────────────────────────────────────────────
// Keeps screen on during active session. Released when session ends or
// browser auto-releases on tab hide; re-acquired on visibilitychange.
let _wakeLock=null;
async function acquireWakeLock(){
  if(!('wakeLock' in navigator)) return;
  try{
    _wakeLock=await navigator.wakeLock.request('screen');
    _wakeLock.addEventListener('release',()=>{_wakeLock=null;});
  }catch(e){}
}
function releaseWakeLock(){
  if(_wakeLock){try{_wakeLock.release();}catch(e){}_wakeLock=null;}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&sessionStartTime&&!_wakeLock) acquireWakeLock();
});

// ─── SESSION CLOCK ─────────────────────────────────────────────────────────────
function startSessionClock(){
  if(!sessionStartTime) sessionStartTime=Date.now();
  if(window._sessionClockIv) clearInterval(window._sessionClockIv);
  window._sessionClockIv=setInterval(renderSessionClock,5000);
  acquireWakeLock();
  renderSessionClock();
}
function renderSessionClock(){
  const el=document.getElementById('session-clock');
  if(!el) return;
  if(!sessionStartTime){
    el.innerHTML=`<button class="btn btn-sm" onclick="startSessionClock()" style="font-size:11px;padding:4px 10px">▶ Start session timer</button>`;
    return;
  }
  const elapsed=Math.floor((Date.now()-sessionStartTime)/1000);
  const m=Math.floor(elapsed/60),s=elapsed%60;
  const over45=elapsed>2700,near45=elapsed>2400;
  const col=over45?'var(--red)':near45?'var(--amber)':'var(--muted)';
  el.innerHTML=`<span style="font-family:var(--mono);font-size:12px;color:${col}">⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} / 45:00</span> <button onclick="resetSessionClock();renderSessionClock()" style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:0 4px">reset</button>`;
}
function resetSessionClock(){
  sessionStartTime=null;
  if(window._sessionClockIv) clearInterval(window._sessionClockIv);
  releaseWakeLock();
}

function getLastCompletedSession(){
  const t=todayStr();
  return getSchedule()
    .filter(s=>s.date<t&&isSessionDone(s.week,s.dayIdx))
    .sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
