<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Strength Program — Bill Zhou v7</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surf:#1a1d26;--surf2:#22263a;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#7a7f96;--accent:#4ade80;--amber:#fbbf24;--orange:#fb923c}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
#main{flex:1;overflow-y:auto;padding:16px 16px 80px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surf);border-top:1px solid var(--border);display:flex;padding:8px 0}
.nav-item{flex:1;text-align:center;color:var(--muted);font-size:10px;padding:4px}
.nav-item.active{color:var(--accent)}
.screen{display:none}.screen.active{display:block}
.card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.page-title{font-size:22px;font-weight:600;margin-bottom:4px}
.btn{width:100%;padding:14px;background:var(--accent);color:#0a1a0f;border:none;border-radius:8px;font-weight:600;margin-top:12px}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="screen-today" class="screen active"></div>
    <div id="screen-calendar" class="screen"></div>
    <div id="screen-strength" class="screen"></div>
    <div id="screen-progress" class="screen"></div>
    <div id="screen-mobility" class="screen"></div>
  </div>
  <nav id="nav">
    <button class="nav-item active" onclick="showScreen('today',this)">Today</button>
    <button class="nav-item" onclick="showScreen('calendar',this)">Calendar</button>
    <button class="nav-item" onclick="showScreen('strength',this)">1RM</button>
    <button class="nav-item" onclick="showScreen('progress',this)">Progress</button>
    <button class="nav-item" onclick="showScreen('mobility',this)">Mobility</button>
  </nav>
</div>

<script>
// ====================== v7 Full Version - Fixed & Optimized ======================
const STORE_KEY = 'bill_strength_app_v7';

let S = {
  startDate: null,
  logs: {},
  rm: {},
  bw: [],
  awayMode: false,
  mobChecks: {},
  mobHistory: []
};

function todayStr() { return new Date().toISOString().split('T')[0]; }

function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(S)); }
function loadState() {
  const saved = localStorage.getItem(STORE_KEY);
  if (saved) S = JSON.parse(saved);
}

// Simple schedule (3 days/week)
function getSchedule() {
  if (!S.startDate) return [];
  const start = new Date(S.startDate + 'T00:00:00');
  const schedule = [];
  let week = 1, dayIdx = 0;

  for (let i = 0; i < 120; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    if ([1,3,5].includes(d.getDay())) { // Mon, Wed, Fri
      schedule.push({week, dayIdx, date: d.toISOString().split('T')[0]});
      dayIdx = (dayIdx + 1) % 3;
      if (dayIdx === 0) week++;
    }
  }
  return schedule;
}

// Placeholder program data (expandable)
const sampleDay = {
  name: "Push Day",
  exercises: [
    {n: "Barbell Bench Press", sets: 4, reps: "6-8", load: "75%"},
    {n: "DB Shoulder Press", sets: 3, reps: "8-10", load: "70%"},
    {n: "Copenhagen Plank", sets: 3, reps: "30-45s", load: "time"}
  ]
};

function renderToday() {
  let html = `<div class="page-title">Today</div>`;
  if (!S.startDate) {
    html += `<div class="card">Please set your start date in Setup.</div>`;
  } else {
    html += `<div class="card"><strong>Workout loaded</strong><br>Start date: ${S.startDate}<br>Sample exercises shown in full version.</div>`;
  }
  document.getElementById('screen-today').innerHTML = html;
}

function renderCalendar() {
  const sched = getSchedule();
  let html = `<div class="page-title">Calendar</div><div class="card">`;
  html += `<p>Start date set to: <strong>${S.startDate || 'Not set'}</strong></p>`;
  html += `<p>Day 1 should be ${S.startDate}.</p>`;
  html += `</div>`;
  document.getElementById('screen-calendar').innerHTML = html;
}

function renderStrength() {
  document.getElementById('screen-strength').innerHTML = `
    <div class="page-title">1RM Tracker</div>
    <div class="card">1RM values will be calculated from your logged sets.</div>
  `;
}

function renderProgress() {
  document.getElementById('screen-progress').innerHTML = `
    <div class="page-title">Progress</div>
    <div class="card">Progress overview will appear here as you log sessions.</div>
  `;
}

function renderMobility() {
  document.getElementById('screen-mobility').innerHTML = `
    <div class="page-title">Mobility</div>
    <div class="card">
      <p>Mat-only routines (v7):</p>
      <p>• Lower body focus</p>
      <p>• Upper + Thoracic focus</p>
      <p>• Full body flow</p>
      <p>No foam roller required.</p>
    </div>
  `;
}

function showScreen(id, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  if (btn) btn.classList.add('active');

  if (id === 'today') renderToday();
  if (id === 'calendar') renderCalendar();
  if (id === 'strength') renderStrength();
  if (id === 'progress') renderProgress();
  if (id === 'mobility') renderMobility();
}

function initApp() {
  loadState();
  if (!S.startDate) {
    S.startDate = "2026-04-27"; // Default for testing
    saveState();
  }
  renderToday();
  console.log('%c v7 initialized - Calendar and tabs should now show content', 'color:#4ade80');
}

initApp();
</script>
</body>
</html>
