// Consecutive days (counting back from today) with either a completed workout
// or a completed mobility routine. A blank "today" doesn't break the streak.
function getTrainingStreak(){
  const sessSet=new Set();
  Object.values(S.logs||{}).forEach(log=>{if(log._completed&&log._completedDate)sessSet.add(log._completedDate);});
  const mobSet=new Set((S.mobHistory||[]).map(e=>e.date));
  const td=new Date(todayStr()+'T00:00:00');
  let streak=0;
  for(let i=0;i<60;i++){
    const dd=new Date(td);dd.setDate(dd.getDate()-i);
    const ds=dateStr(dd);
    if(sessSet.has(ds)||mobSet.has(ds))streak++;
    else if(i>0)break;
  }
  return streak;
}
function routineForDayIdx(di){
  // Day 1 (idx 0) horizontal push/pull → upper (B). Day 2 (idx 1) lower → A. Day 3 (idx 2) vertical push/pull → upper (B).
  return di===1?0:1;
}
function switchRestMobRoutine(i){restMobRoutine=i;expandedMob=-1;renderToday();}
function toggleRestMobCheck(i){setMobCheck(i,!getMobChecks(restMobPhase,restMobRoutine)[i],restMobPhase,restMobRoutine);renderToday();}
function toggleRestMobExpand(i){expandedMob=expandedMob===i?-1:i;renderToday();}
function clearRestMobChecks(){
  S.mobChecks[getMobCheckKey(restMobPhase,restMobRoutine)]={};
  if(S.mobHistory) S.mobHistory=S.mobHistory.filter(e=>!(e.date===todayStr()&&e.phase===restMobPhase&&e.routine===restMobRoutine));
  saveState();renderToday();
}

function renderRestDayToday(missed){
  const lastSess=getLastCompletedSession();
  const next=getNextPendingSession();
  const phaseRefSess=lastSess||next;
  const phaseIdx=phaseRefSess?phaseFor(phaseRefSess.week):0;

  // Initialize / re-sync rest-day routine selection
  if(restMobRoutine===-1||restMobPhase!==phaseIdx){
    restMobRoutine=lastSess?routineForDayIdx(lastSess.dayIdx):2;
    restMobPhase=phaseIdx;
  }

  const phaseData=MOB_DATA[restMobPhase];
  const routine=phaseData.routines[restMobRoutine];
  const checks=getMobChecks(restMobPhase,restMobRoutine);
  const totalItems=routine.items.length;
  const checkedCount=Object.values(checks).filter(Boolean).length;
  const pct=Math.round(checkedCount/totalItems*100);
  const today=todayStr();

  let html='';

  // Missed banner (mirrors workout-day rendering)
  if(missed.length>0&&missed.length!==_missedBannerDismissedCount&&!viewingSession)
    html+=`<div class="missed-banner"><div class="row" style="margin-bottom:6px;align-items:center"><span style="font-size:13px;font-weight:500;color:var(--red);flex:1">⚠ ${missed.length} missed session${missed.length>1?'s':''}</span><button class="btn btn-sm" onclick="openMissedModal()" style="border-color:var(--red);color:var(--red)">Review</button><button onclick="dismissMissedBanner()" aria-label="Dismiss" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;opacity:.7">×</button></div><div style="font-size:12px;color:var(--red);opacity:.8">Tap Review to slide your program forward</div></div>`;

  // Header
  const lastInfo=lastSess
    ? `After ${P.phases[phaseFor(lastSess.week)].days[lastSess.dayIdx].name}`
    : 'No completed sessions yet';
  html+=`<div class="page-header"><div class="row"><div><div class="page-title">Rest day · Mobility</div><div class="page-sub">${formatDateDisplay(today)} · ${lastInfo}</div></div><div style="display:flex;gap:6px;align-items:center"><span class="badge badge-blue">Rest</span><button class="btn btn-sm" onclick="openWeekPicker()" style="font-size:11px">Jump</button></div></div></div>`;

  // Next workout preview
  if(next) html+=`<div class="alert alert-blue" style="margin-bottom:10px;font-size:12px">Next workout: ${formatDateDisplay(next.date)} · Wk ${next.week} Day ${next.dayIdx+1}</div>`;

  html+=`<div class="alert alert-amber" style="margin-bottom:12px">Rest day mobility — non-negotiable for 45+. The suggested routine complements your last workout. Switch routines if you'd rather focus elsewhere.</div>`;

  // Routine tabs
  const suggestedRoutine=lastSess?routineForDayIdx(lastSess.dayIdx):2;
  html+=`<div class="section-label">Routine</div><div style="display:flex;gap:8px;margin-bottom:14px">`;
  phaseData.routineLabel.forEach((label,ri)=>{
    const isSuggested=ri===suggestedRoutine, isActive=ri===restMobRoutine;
    html+=`<button style="flex:1;padding:10px 6px;border-radius:var(--r-sm);border:1px solid ${isActive?'var(--accent)':isSuggested?'var(--amber)':'var(--border)'};background:${isActive?'var(--accent-dim)':isSuggested?'var(--amber-dim)':'transparent'};color:${isActive?'var(--accent)':isSuggested?'var(--amber)':'var(--muted)'};cursor:pointer;font-size:12px;font-weight:500;font-family:var(--sans);line-height:1.4;text-align:center" onclick="switchRestMobRoutine(${ri})">
      <strong>${['A','B','C'][ri]}</strong><br><span style="font-size:10px">${['Lower','Upper+T-spine','Full Flow'][ri]}</span>${isSuggested&&!isActive?'<br><span style="font-size:9px;opacity:.7">suggested</span>':''}
    </button>`;
  });
  html+=`</div>`;

  // Routine info + progress ring
  const r2=22,circ=2*Math.PI*r2,dash=circ*(pct/100),gap=circ-dash;
  html+=`<div class="card" style="margin-bottom:14px"><div class="row" style="margin-bottom:6px"><div><div style="font-size:14px;font-weight:500;color:var(--text)">${phaseData.routineLabel[restMobRoutine]}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${routine.focus}</div><div style="font-size:11px;font-family:var(--mono);color:var(--accent);margin-top:3px">${routine.dur} · ${phaseData.routineSuggest[restMobRoutine]}</div></div>
  <svg class="mob-ring" viewBox="0 0 56 56"><circle cx="28" cy="28" r="${r2}" fill="none" stroke="var(--surf2)" stroke-width="5"/><circle cx="28" cy="28" r="${r2}" fill="none" stroke="var(--accent)" stroke-width="5" stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${(circ/4).toFixed(1)}" stroke-linecap="round"/><text x="28" y="33" text-anchor="middle" font-size="12" font-weight="600" font-family="monospace" fill="var(--text)">${pct}%</text></svg></div>
  <div style="font-size:11px;color:var(--muted)">${checkedCount} of ${totalItems} done today</div>
  ${pct===100?`<div class="alert alert-green" style="margin-top:10px;margin-bottom:0">✓ Routine complete — logged!</div>`:''}</div>`;

  // Exercise checklist
  routine.items.forEach((item,i)=>{
    const checked=!!checks[i],expanded=expandedMob===i,ref=EXREF[item.n];
    html+=`<div class="mob-check-card${checked?' checked':''}${expanded?' expanded':''}">
      <div class="mob-check-row" onclick="toggleRestMobCheck(${i})">
        <div class="mob-checkbox">${checked?'✓':''}</div>
        <div style="flex:1"><div class="mob-check-name">${item.n}${item.isNew?` <span class="badge badge-amber" style="font-size:10px;padding:1px 5px">new</span>`:''}</div><div class="mob-check-meta">${item.sets}×${item.hold}</div></div>
        <button class="help-btn" style="margin-left:0" onclick="event.stopPropagation();toggleRestMobExpand(${i})">${expanded?'▲':'▼'}</button>
      </div>`;
    if(item.note) html+=`<div style="font-size:12px;color:var(--muted);margin:8px 0 0;padding-top:8px;border-top:1px solid var(--border)">${item.note}</div>`;
    if(expanded&&ref){
      html+=`<div class="mob-detail">`;
      if(ref.steps){html+=`<ol class="mob-steps">`;ref.steps.forEach(s=>html+=`<li><span>${s}</span></li>`);html+=`</ol>`;}
      if(ref.cue) html+=`<div style="font-size:12px;color:var(--accent);background:var(--accent-dim);border-radius:6px;padding:8px;margin-top:8px">💡 ${ref.cue}</div>`;
      if(ref.mistake) html+=`<div style="font-size:12px;color:var(--red);background:var(--red-dim);border-radius:6px;padding:8px;margin-top:6px">⚠ ${ref.mistake}</div>`;
      if(ref.search){const q=encodeURIComponent(ref.search+' how to');html+=`<a href="https://www.youtube.com/results?search_query=${q}" class="ref-link" style="margin-top:8px" target="_blank">▶ Watch on YouTube</a>`;}
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  if(checkedCount<totalItems) html+=`<button class="btn btn-ghost" onclick="clearRestMobChecks()">Reset today's checklist</button>`;
  html+=`<div style="height:8px"></div>`;

  document.getElementById('screen-today').innerHTML=html;
  resetSessionClock(); // no session timer on rest days
  renderStickyTimer();
}

function renderToday(){
  if(!S.startDate){initSetup();return;}
  const missed=getMissedSessions();
  const todaySess=getTodaySession();
  const next=getNextPendingSession();

  // Rest day: no scheduled session today and not viewing a specific session.
  // Show mobility routine aligned to last completed workout.
  if(!todaySess&&!viewingSession){
    return renderRestDayToday(missed);
  }

  let sess=viewingSession;
  if(!sess){if(todaySess&&!isSessionDone(todaySess.week,todaySess.dayIdx))sess={week:todaySess.week,dayIdx:todaySess.dayIdx};else if(next)sess={week:next.week,dayIdx:next.dayIdx};else sess={week:16,dayIdx:2};}
  const w=sess.week,di=sess.dayIdx,pi=phaseFor(w),phase=P.phases[pi],day=phase.days[di],log=getLog(w,di);
  const sched=getSchedule(),schedEntry=sched.find(s=>s.week===w&&s.dayIdx===di),schedDate=schedEntry?schedEntry.date:null;
  const isDeload=w===16,today=todayStr(),isToday=schedDate===today,isFuture=schedDate&&schedDate>today,alreadyCompleted=!!log._completed,wasAway=!!log._awayMode;
  const rmRetest=needsRMRetest();

  // Build exercise list — away mode swaps equipment exercises
  const exercises=day.exercises.map(ex=>{
    if(S.awayMode){const sub=getAwayExercise(ex);return sub||ex;}
    return ex;
  });

  let doneSets=0,totalSets=0;
  exercises.forEach((ex,ei)=>{totalSets+=ex.sets;const el=log[ei]||{};for(let si=0;si<ex.sets;si++)if(el[si]&&el[si].done)doneSets++;});
  const pct=totalSets>0?Math.round(doneSets/totalSets*100):0,allDone=pct===100&&!alreadyCompleted;

  let html='';

  // Missed banner — dismissible (re-shows if missed count changes or page reloads)
  if(missed.length>0&&missed.length!==_missedBannerDismissedCount&&!viewingSession)html+=`<div class="missed-banner"><div class="row" style="margin-bottom:6px;align-items:center"><span style="font-size:13px;font-weight:500;color:var(--red);flex:1">⚠ ${missed.length} missed session${missed.length>1?'s':''}</span><button class="btn btn-sm" onclick="openMissedModal()" style="border-color:var(--red);color:var(--red)">Review</button><button onclick="dismissMissedBanner()" aria-label="Dismiss" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;opacity:.7">×</button></div><div style="font-size:12px;color:var(--red);opacity:.8">Tap Review to slide your program forward</div></div>`;

  // 1RM retest nudge
  if(rmRetest)html+=`<div class="alert alert-purple" style="margin-bottom:10px">Phase change coming — consider retesting your 1RM for accurate targets. <span onclick="showScreen('strength',document.querySelectorAll('.nav-item')[2])" style="color:var(--purple);text-decoration:underline;cursor:pointer">Go to 1RM →</span></div>`;

  // Header
  html+=`<div class="page-header"><div class="row"><div><div class="page-title">Week ${w} · Day ${di+1}</div><div class="page-sub">${formatDateDisplay(schedDate)} · ${phase.short}</div></div><div style="display:flex;gap:6px;align-items:center">${isToday?'<span class="badge badge-green">Today</span>':''}${isFuture?'<span class="badge badge-blue">Upcoming</span>':''}${alreadyCompleted?(wasAway?'<span class="badge badge-orange">✈ Away</span>':'<span class="badge badge-purple">Done ✓</span>'):''}<button class="btn btn-sm" onclick="openWeekPicker()" style="font-size:11px">Jump</button></div></div>
  <div id="session-clock" style="margin-top:4px"></div></div>`;

  // Away mode toggle
  const bw=getLatestBW();
  html+=`<div class="away-toggle-wrap">
    <div>
      <div class="away-toggle-label">✈ Away from gym</div>
      <div style="font-size:11px;color:var(--orange);opacity:.8;margin-top:2px">${S.awayMode?'Bodyweight substitutions active':'Toggle for bodyweight-only session'}</div>
    </div>
    <div class="toggle-switch${S.awayMode?' on':''}" onclick="toggleAwayMode()"><div class="toggle-knob"></div></div>
  </div>`;

  // Away mode info banner
  if(S.awayMode){
    const bwMsg=bw?`Based on your ${bw} kg bodyweight and 1RM entries.`:'Add bodyweight in Progress tab for personalised rep targets.';
    html+=`<div class="away-banner">
      <div style="font-size:13px;font-weight:500;color:var(--orange);margin-bottom:4px">✈ Bodyweight session active</div>
      <div style="font-size:12px;color:var(--orange);opacity:.9;line-height:1.6">All exercises swapped for equipment-free alternatives. ${bwMsg} This session will count toward your program progress.</div>
    </div>`;
    // Show calibration if we have data
    if(bw&&(getRM('bench')||getRM('squat')||getRM('deadlift'))){
      const benchRM=getRM('bench');
      if(benchRM){const ratio=benchRM/bw;const lvl=getStrengthLevel(ratio);html+=`<div class="card" style="margin-bottom:10px"><div class="row"><span style="font-size:12px;color:var(--muted)">Relative strength (Bench / BW)</span><span style="font-size:13px;font-weight:500;color:${lvl.color}">${lvl.label}</span></div><div style="font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:4px">Ratio: ${ratio.toFixed(2)} · Rep targets calibrated to this level</div></div>`;}
    }
  }

  if(isDeload)html+=`<div class="alert alert-blue">Deload week — reduced intensity, same exercises. Away mode applies same substitutions.</div>`;
  if(day.note&&!S.awayMode)html+=`<div class="alert alert-amber">${day.note}</div>`;

  // Warmup
  const awayWarmup="5 min of jumping jacks, high knees, or brisk walk · arm circles × 10 · hip circles × 10 · bodyweight squat × 10";
  html+=`<div class="warmup-box"><div class="warmup-label">WARMUP</div><div class="warmup-text">${S.awayMode?awayWarmup:day.warmup}</div></div>`;

  // Progress bar
  if(!alreadyCompleted)html+=`<div class="row" style="margin-bottom:8px"><span style="font-size:12px;color:var(--muted)">${doneSets} / ${totalSets} sets</span><span style="font-size:12px;font-family:var(--mono);color:${pct===100?'var(--accent)':'var(--muted)'};">${pct}%</span></div><div class="prog-track" style="margin-bottom:14px"><div class="prog-fill" style="width:${pct}%"></div></div>`;

  // Exercises
  exercises.forEach((ex,ei)=>{
    const exLog=log[ei]||{};
    const exAllDone=!alreadyCompleted&&Object.values(exLog).filter(v=>v&&v.done).length>=ex.sets;
    const rec=ex.isAway?null:getExRec(ex);
    const ref=EXREF[ex.n];
    const isAway=!!ex.isAway;

    html+=`<div class="ex-card${exAllDone?' done':''}${isAway?' away-ex':''}">`;
    html+=`<div class="row" style="align-items:flex-start"><div style="flex:1"><div class="ex-name">${ex.n}${ex.ss?'<span class="ss-badge">superset</span>':''}${isAway?'<span class="away-badge">✈ BW sub</span>':''}</div><div class="ex-detail">${ex.sets} sets · ${ex.reps} · ${ex.load}${ex.rest>0?' · '+ex.rest+'s rest':''}</div></div>${ref?`<button class="help-btn" onclick="openRef('${ex.n.replace(/'/g,"\\'")}')">?</button>`:''}</div>`;

    // Weight rec (gym) or calibrated rep target (away)
    if(isAway&&ex.ratio!==undefined&&ex.ratio!==null){
      const lvl=getStrengthLevel(ex.ratio);
      html+=`<div class="ex-away-rec">🎯 Target: <strong>${ex.reps} reps × ${ex.sets} sets</strong> &nbsp;·&nbsp; calibrated for <span style="color:${lvl.color}">${lvl.label}</span> level</div>`;
      if(ex.alts&&ex.alts.length>0){
        html+=`<div style="font-size:11px;color:var(--orange);margin:4px 0 6px;opacity:.8">Harder option: ${ex.alts[0].n} — ${ex.alts[0].note}</div>`;
      }
    }else if(isAway){
      html+=`<div class="ex-away-rec">🎯 Target: <strong>${ex.reps} reps × ${ex.sets} sets</strong> &nbsp;·&nbsp; <span style="opacity:.8">Add 1RM + bodyweight for personalised targets</span></div>`;
    }else if(rec){
      html+=`<div class="ex-rec">🎯 Target: <strong>${rec.kg} kg</strong>&nbsp;·&nbsp;${rec.pct}% of ${rec.rm} kg 1RM</div>`;
    }else if(!isAway&&LIFT_TO_RM[ex.n]&&!getRM(LIFT_TO_RM[ex.n])){
      html+=`<div class="alert alert-blue" style="margin:6px 0;font-size:11px;padding:6px 10px">Enter your 1RM in the 1RM tab to get weight targets</div>`;
    }

    html+=`<div class="ex-note">${ex.note}</div>`;

    if(!alreadyCompleted){
      // Last session reference
      const lastSess = getLastSession(ex.n);
      const prData = getPR(ex.n);
      if(lastSess){
        const lastSetsStr = lastSess.sets.slice(0,3).map(s=>isBWOnly(ex.load)?`${s.reps}r`:`${s.weight}kg×${s.reps}`).join(' · ');
        html+=`<div style="font-size:11px;color:var(--muted);background:var(--surf2);border-radius:6px;padding:6px 10px;margin:4px 0 6px;display:flex;align-items:center;justify-content:space-between">
          <span>Last: ${lastSetsStr}</span>
          ${prData&&prData.date===lastSess.date?'<span style="color:var(--amber);font-size:10px">★ PR</span>':''}
        </div>`;
      }
      html+=`<div class="sets-area">`;
      for(let si=0;si<ex.sets;si++){
        const s=exLog[si]||{};
        const tgt=rec?rec.kg:null;
        const wv=parseFloat(s.weight);
        const onT=tgt&&wv&&Math.abs(wv-tgt)<=tgt*.07,offT=tgt&&wv&&!onT;
        const bwOnly = isBWOnly(ex.load)||isAway;
        const timeBased = isTimeBased(ex.reps);
        // PR highlight for this set
        const isPR = prData&&!bwOnly&&!timeBased&&s.weight&&parseFloat(s.weight)>prData.bestWeight;
        if(timeBased){
          // Time-based: seconds input only
          html+=`<div class="set-row">
            <span class="set-label">Set ${si+1}</span>
            <span style="font-size:11px;color:var(--accent);font-family:var(--mono);background:var(--accent-dim);padding:4px 8px;border-radius:6px;flex-shrink:0">${ex.reps}</span>
            <input class="set-input" type="number" inputmode="numeric" placeholder="sec held" value="${s.reps||''}" style="max-width:90px" onchange="logField(${w},${di},${ei},${si},'reps',this.value)">
            <button class="set-check${s.done?' done':''}" onclick="toggleDone(${w},${di},${ei},${si},${ex.rest||0},'${ex.n.replace(/'/g,"\\'")}')">✓</button>
          </div>`;
        }else if(bwOnly){
          // Reps only — no weight field
          html+=`<div class="set-row">
            <span class="set-label">Set ${si+1}</span>
            <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${s.reps||''}" style="max-width:100px" onchange="logField(${w},${di},${ei},${si},'reps',this.value)">
            ${s.done?'<span style="width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:18px">✓</span>':''}
            <button class="set-check${s.done?' done':''}" onclick="toggleDone(${w},${di},${ei},${si},${ex.rest||0},'${ex.n.replace(/'/g,"\\'")}')">✓</button>
          </div>`;
        }else{
          html+=`<div class="set-row">
            <span class="set-label">Set ${si+1}</span>
            <input class="set-input${onT?' on-target':offT?' off-target':''}" type="number" inputmode="decimal" placeholder="kg" value="${s.weight||''}" onchange="logField(${w},${di},${ei},${si},'weight',this.value)">
            <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${s.reps||''}" onchange="logField(${w},${di},${ei},${si},'reps',this.value)">
            <button class="set-check${s.done?' done':''}${isPR?' style=\"border-color:var(--amber)\"':''}" onclick="toggleDone(${w},${di},${ei},${si},${ex.rest||0},'${ex.n.replace(/'/g,"\\'")}')">✓</button>
          </div>`;
        }
      }
      html+=`</div>`;
    }else{
      let hasData=false;
      for(let si=0;si<ex.sets;si++){const s=exLog[si]||{};if(s.weight||s.reps)hasData=true;}
      if(hasData){
        html+=`<div class="sets-area">`;
        for(let si=0;si<ex.sets;si++){
          const s=exLog[si]||{};
          if(s.weight||s.reps) html+=`<div style="display:flex;gap:8px;font-size:12px;font-family:var(--mono);color:var(--muted);margin-bottom:4px"><span>Set ${si+1}</span>${s.weight?`<span style="color:var(--text)">${s.weight} kg</span><span>×</span>`:''}<span style="color:var(--text)">${s.reps||'—'} reps</span>${s.done?'<span style="color:var(--accent)">✓</span>':''}</div>`;
        }
        html+=`</div>`;
      }
    }
    html+=`</div>`;
  });

  // Manual timer override (for between exercises etc)
  if(!alreadyCompleted){
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 0;margin-top:4px">
      <span style="font-size:11px;color:var(--muted)">Manual timer:</span>
      <button class="btn btn-sm" onclick="startTimer(60,'Manual')">60s</button>
      <button class="btn btn-sm" onclick="startTimer(90,'Manual')">90s</button>
      <button class="btn btn-sm" onclick="startTimer(120,'Manual')">2 min</button>
    </div>`;
  }

  if(allDone)html+=`<button class="complete-btn" onclick="completeSession(${w},${di})">Mark session complete →</button>`;
  if(alreadyCompleted)html+=`<button class="btn" onclick="uncompleteSession(${w},${di})" style="color:var(--muted)">Undo completion</button>`;

  document.getElementById('screen-today').innerHTML=html;
  if(alreadyCompleted) resetSessionClock();
  else renderSessionClock();
  renderStickyTimer();
}

function logField(w,di,ei,si,f,v){const l=getLog(w,di);if(!l[ei])l[ei]={};if(!l[ei][si])l[ei][si]={};l[ei][si][f]=v;setLog(w,di,l);}

// Track within-session PRs to avoid repeated flashes for same weight
const sessionPRsFlashed = {};

function toggleDone(w,di,ei,si,restSecs,exName){
  const l=getLog(w,di);
  if(!l[ei])l[ei]={};
  if(!l[ei][si])l[ei][si]={};
  const wasDone=l[ei][si].done;
  l[ei][si].done=!wasDone;
  setLog(w,di,l);
  // Auto-start timer when marking done (not when undoing)
  if(!wasDone&&restSecs>0) startTimer(restSecs, exName||'Rest');
  // PR detection — only flash once per weight per exercise per session
  if(!wasDone&&exName&&l[ei][si].weight){
    const thisWeight=parseFloat(l[ei][si].weight);
    const sessionKey=`${dayKey(w,di)}_${exName}`;
    const alreadyFlashedThisWeight = sessionPRsFlashed[sessionKey]>=thisWeight;
    if(!alreadyFlashedThisWeight){
      const pr=getPR(exName);
      // Only flash if it's a genuine all-time best across ALL previous sessions
      if(!pr||thisWeight>pr.bestWeight){
        sessionPRsFlashed[sessionKey]=thisWeight;
        showPRFlash(exName);
      }
    }
  }
  renderToday();
}

function showPRFlash(exName){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--amber);color:#1a0f00;padding:16px 24px;border-radius:12px;font-size:16px;font-weight:600;z-index:500;pointer-events:none;animation:prfadeout 2s forwards';
  el.textContent=`⭐ New PR — ${exName}!`;
  if(!document.getElementById('pr-flash-style')){
    const st=document.createElement('style');
    st.id='pr-flash-style';
    st.textContent='@keyframes prfadeout{0%{opacity:1;transform:translate(-50%,-55%)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-65%)}}';
    document.head.appendChild(st);
  }
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);

function completeSession(w,di){
  const l=getLog(w,di);
  l._completed=true;l._completedDate=todayStr();l._awayMode=S.awayMode;
  setLog(w,di,l);
  // Use the same resolved exercise list that was shown to the user
  const pi=phaseFor(w);
  const day=P.phases[pi].days[di];
  const resolvedExercises=day.exercises.map(ex=>{
    if(S.awayMode){const sub=getAwayExercise(ex);return sub?{...sub,originalName:ex.n}:ex;}
    return ex;
  });
  resolvedExercises.forEach((ex,ei)=>{
    const exLog=l[ei]||{};
    const sets=Object.values(exLog).filter(s=>s&&typeof s==='object'&&'done' in s);
    if(sets.length) recordExerciseHistory(ex.originalName||ex.n, sets, w);
  });
  // Auto-calculate 1RM from history after recording
  RM_LIFTS.forEach(lift=>{
    const auto=autoCalcRM(lift.id);
    if(auto&&(!S.rm[lift.id]||!S.rm[lift.id].weight)){
      if(!S.rm[lift.id])S.rm[lift.id]={};
      S.rm[lift.id]._auto=auto;
    }
  });
  // Clear session PR tracking
  Object.keys(sessionPRsFlashed).forEach(k=>{if(k.startsWith(dayKey(w,di)))delete sessionPRsFlashed[k];});
  saveState();
  resetSessionClock();
  viewingSession=null;window.scrollTo(0,0);renderToday();
}

function uncompleteSession(w,di){const l=getLog(w,di);delete l._completed;delete l._completedDate;delete l._awayMode;setLog(w,di,l);renderToday();}

function openMissedModal(){const m=getMissedSessions();let html=`<div class="alert alert-amber" style="margin-bottom:12px">You have ${m.length} unlogged session${m.length>1?'s':''} in the past. Tap "Slide program forward" to realign your schedule to today.</div>`;m.forEach(s=>{const ph=P.phases[phaseFor(s.week)],d=ph.days[s.dayIdx];html+=`<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center"><span class="badge badge-red">Wk ${s.week}</span><div><div style="font-size:13px;color:var(--text)">${d.name}</div><div style="font-size:11px;color:var(--muted)">${formatDateDisplay(s.date)}</div></div></div>`;});document.getElementById('modal-missed-body').innerHTML=html;document.getElementById('modal-missed').classList.add('open');}

function openWeekPicker(){const sched=getSchedule(),today=todayStr(),grid=document.getElementById('week-picker-grid');let h='';for(let w=1;w<=16;w++)for(let di=0;di<3;di++){const e=sched.find(s=>s.week===w&&s.dayIdx===di),done=isSessionDone(w,di),isT=e&&e.date===today,isCurr=viewingSession&&viewingSession.week===w&&viewingSession.dayIdx===di;h+=`<div class="week-cell${done?' done':isT||isCurr?' current':''}" onclick="jumpTo(${w},${di})" style="font-size:10px"><span class="wn" style="font-size:12px">W${w}</span><span>D${di+1}</span></div>`;}grid.innerHTML=h;document.getElementById('week-picker-modal').classList.add('open');}
function jumpTo(w,di){viewingSession={week:w,dayIdx:di};document.getElementById('week-picker-modal').classList.remove('open');window.scrollTo(0,0);renderToday();}

let calViewMonth=null;

  const{year,month}=calViewMonth,sched=getSchedule(),today=todayStr();

  for(let d=1;d<=daysInMonth;d++){
    const date=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry=sched.find(s=>s.date===date),isToday=date===today,isFut=date>today;
    const hasMobDone=mobDoneSet.has(date);

    if(entry){

      const done=!!doneLog._completed,wasAway=!!doneLog._awayMode;
      cls=done?(wasAway?'completed-away':'completed'):isToday?'today-workout':isFut?'has-workout future':'missed has-workout';
      // Day 1/3 (idx 0/2) = upper-body push/pull. Day 2 (idx 1) = lower body.
      const bp=entry.dayIdx===1?'L':'U';

    }else if(isToday){
      cls='today-rest';
      label=hasMobDone?'mob ✓':'rest';
    }else if(!isFut){
      // Past rest day
      label=hasMobDone?'mob ✓':'';
      if(hasMobDone)cls='has-workout';
    }else{
      // Future rest day — show which routine is suggested
      label='rest';
    }
    if(hasMobDone&&!entry) mobDot=`<span style="font-size:8px;color:var(--purple)">◆</span>`;
    const oc=entry?`onclick="jumpTo(${entry.week},${entry.dayIdx});showScreenById('today')"`:hasMobDone?`onclick="showScreen('mobility',document.querySelectorAll('.nav-item')[4])"`:'' ;
    html+=`<div class="cal-day ${cls}" ${oc} style="${hasMobDone&&!entry?'border:1px solid rgba(167,139,250,.4);background:rgba(167,139,250,.08)':''}">
      <span>${d}</span>
      ${label?`<span style="font-size:8px;margin-top:1px;opacity:.85;line-height:1.2;text-align:center">${label}</span>`:''}
    </div>`;
  }
  html+=`</div>`;

  [{c:'var(--accent)',l:'Today'},{c:'rgba(74,222,128,.15)',l:'Done (gym)'},{c:'rgba(251,146,60,.15)',l:'Done (away ✈)'},{c:'rgba(248,113,113,.15)',l:'Missed'},{c:'rgba(167,139,250,.08)',l:'Mobility done ◆'},{c:'var(--surf2)',l:'Upcoming'}].forEach(x=>html+=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:${x.c};border:1px solid rgba(255,255,255,.08);display:inline-block"></span><span style="color:var(--muted)">${x.l}</span></span>`);
  html+=`</div>`;
  html+=`<div style="font-size:10px;color:var(--muted);margin-bottom:14px;line-height:1.5">Cell label: <strong style="color:var(--text)">U</strong>=Upper body · <strong style="color:var(--text)">L</strong>=Lower body · <strong style="color:var(--text)">1/2/3</strong>=session in cycle · <strong style="color:var(--text)">✈</strong>=away mode</div>`;

  html+=`<div class="section-label">Next sessions</div>`;
  upcoming.forEach(s=>{const ph=P.phases[phaseFor(s.week)],d=ph.days[s.dayIdx],isT=s.date===today;html+=`<div class="card" style="cursor:pointer;${isT?'border-color:rgba(74,222,128,.3)':''}" onclick="jumpTo(${s.week},${s.dayIdx});showScreenById('today')"><div class="row"><div><div style="font-size:13px;font-weight:500">${d.name}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${formatDateDisplay(s.date)} · Week ${s.week} · ${ph.short}</div></div>${isT?'<span class="badge badge-green">Today</span>':'<span style="font-size:11px;color:var(--muted)">→</span>'}</div></div>`;});
  document.getElementById('screen-calendar').innerHTML=html;

function saveRM(id,field,val){if(!S.rm[id])S.rm[id]={};S.rm[id][field]=val;if(S.rm[id].weight&&S.rm[id].reps)S.rm[id].estimated=calcEpley(parseFloat(S.rm[id].weight),parseInt(S.rm[id].reps));saveState();}
function clearRMOverride(id){if(S.rm[id]){delete S.rm[id].weight;delete S.rm[id].reps;delete S.rm[id].estimated;}saveState();renderStrength();}
function snapshotRM(id){const rm=S.rm[id];if(!rm||!rm.weight||!rm.reps)return;if(!S.rmHistory[id])S.rmHistory[id]=[];S.rmHistory[id].push({date:todayStr(),weight:parseFloat(rm.weight),reps:parseInt(rm.reps),estimated:calcEpley(parseFloat(rm.weight),parseInt(rm.reps))});const next=getNextPendingSession();if(next&&PHASE_CHANGE_WEEKS.includes(next.week))S.rm[`phase_retest_${next.week}`]=true;saveState();renderStrength();}

// ─── MONTHLY REPORT HELPERS ───────────────────────────────────────────────────
let progressViewMonth=null; // 'YYYY-MM'; null = current month
function getCurrentMonthStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function shiftMonth(monthStr,delta){const[y,m]=monthStr.split('-').map(Number);const d=new Date(y,m-1+delta,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function formatMonthDisplay(monthStr){const[y,m]=monthStr.split('-').map(Number);return new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});}

// PRs in month: weight PRs for weighted exercises, rep PRs for always-bodyweight exercises.
// "PR" means: bestWeight (or bestReps for BW-only) exceeds all prior history before this month entry.
function getPRsInMonth(monthStr){
  const prs=[];
  Object.entries(S.exHistory||{}).forEach(([exName,hist])=>{
    if(!hist||!hist.length) return;
    const sorted=[...hist].sort((a,b)=>a.date.localeCompare(b.date));
    const isAlwaysBW=sorted.every(e=>!e.bestWeight||e.bestWeight===0);
    let runningBest=0,monthPR=null;
    for(const e of sorted){
      const metric=isAlwaysBW?(e.bestReps||0):(e.bestWeight||0);
      if(metric>runningBest&&metric>0){
        runningBest=metric;
        if(e.date.startsWith(monthStr)) monthPR={exName,value:metric,isBW:isAlwaysBW,date:e.date};
      }
    }
    if(monthPR) prs.push(monthPR);
  });
  return prs.sort((a,b)=>a.date.localeCompare(b.date));
}

function getMonthlyStats(monthStr){
  let workouts=0;
  Object.values(S.logs||{}).forEach(log=>{
    if(log._completed&&log._completedDate&&log._completedDate.startsWith(monthStr)) workouts++;
  });
  const mobility=(S.mobHistory||[]).filter(e=>e.date.startsWith(monthStr)).length;
  const setsByEx={};let totalSets=0;
  Object.entries(S.exHistory||{}).forEach(([exName,hist])=>{
    let total=0;
    hist.forEach(e=>{if(e.date.startsWith(monthStr)) total+=(e.sets||[]).length;});
    if(total>0){setsByEx[exName]=total;totalSets+=total;}
  });
  const topExercises=Object.entries(setsByEx).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const prs=getPRsInMonth(monthStr);
  return{workouts,mobility,totalSets,topExercises,prs};
}

function progressMonthChange(delta){
  const cur=progressViewMonth||getCurrentMonthStr();
  const next=shiftMonth(cur,delta);
  if(next>getCurrentMonthStr()) return; // don't navigate to future
  progressViewMonth=next;
  renderProgress();
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function renderProgress(){
  const sched=getSchedule();
  let totalSets=0,totalReps=0,sessComp=0,awaySess=0,onTgt=0,chkd=0;
  const wkSets={};
  for(let w=1;w<=16;w++){wkSets[w]=0;for(let di=0;di<3;di++){const l=getLog(w,di);if(l._completed){sessComp++;if(l._awayMode)awaySess++;}const ph=P.phases[phaseFor(w)],d=ph.days[di];d.exercises.forEach((ex,ei)=>{const el=l[ei]||{},rec=getExRec(ex);for(let si=0;si<ex.sets;si++){const s=el[si]||{};if(s.done){totalSets++;wkSets[w]++;}if(s.reps)totalReps+=parseInt(s.reps)||0;if(rec&&s.weight){chkd++;const wv=parseFloat(s.weight);if(Math.abs(wv-rec.kg)<=rec.kg*.07)onTgt++;}}});}}
  const pct=Math.round(sessComp/48*100),adh=chkd>0?Math.round(onTgt/chkd*100):null;
  const mobHistory=S.mobHistory||[];
  let mobStreak=0;const td=new Date(todayStr()+'T00:00:00');for(let i=0;i<30;i++){const dd=new Date(td);dd.setDate(dd.getDate()-i);const ds=dateStr(dd);if(mobHistory.some(e=>e.date===ds))mobStreak++;else if(i>0)break;}
  const mobTotalCompletions=mobHistory.length;

  let html=`<div class="page-header"><div class="row"><div><div class="page-title">Progress</div><div class="page-sub">Bill Zhou · 16-week program</div></div><button class="btn btn-sm" onclick="openBWModal()">+ Weight</button></div></div>`;

  // ── Monthly report card ──
  const monthStr=progressViewMonth||getCurrentMonthStr();
  const isCurrentMonth=monthStr===getCurrentMonthStr();
  const prevMonthStr=shiftMonth(monthStr,-1);
  const mStats=getMonthlyStats(monthStr);
  const pStats=getMonthlyStats(prevMonthStr);
  const dWk=mStats.workouts-pStats.workouts,dMob=mStats.mobility-pStats.mobility,dSets=mStats.totalSets-pStats.totalSets;
  const dBadge=(d,cur,prev)=>{
    if(cur===0&&prev===0) return '';
    if(d===0) return '';
    const col=d>0?'var(--accent)':'var(--red)';
    return `<span style="font-size:10px;color:${col};margin-left:4px">${d>0?'+':''}${d}</span>`;
  };
  html+=`<div class="card" style="margin-bottom:14px">
    <div class="row" style="margin-bottom:12px;align-items:center">
      <button class="btn btn-sm" onclick="progressMonthChange(-1)" style="padding:4px 10px">←</button>
      <div style="text-align:center;flex:1"><div style="font-size:14px;font-weight:500">${formatMonthDisplay(monthStr)}</div><div style="font-size:10px;color:var(--muted)">${isCurrentMonth?'Current month · vs '+formatMonthDisplay(prevMonthStr):'vs '+formatMonthDisplay(prevMonthStr)}</div></div>
      <button class="btn btn-sm" onclick="progressMonthChange(1)" style="padding:4px 10px;${isCurrentMonth?'visibility:hidden':''}">→</button>
    </div>
    <div class="stat-grid" style="margin-bottom:0">
      <div class="stat-card"><div class="stat-num">${mStats.workouts}</div><div class="stat-lbl">Workouts${dBadge(dWk,mStats.workouts,pStats.workouts)}</div></div>
      <div class="stat-card"><div class="stat-num">${mStats.mobility}</div><div class="stat-lbl">Mobility${dBadge(dMob,mStats.mobility,pStats.mobility)}</div></div>
      <div class="stat-card"><div class="stat-num">${mStats.totalSets}</div><div class="stat-lbl">Sets${dBadge(dSets,mStats.totalSets,pStats.totalSets)}</div></div>
      <div class="stat-card"><div class="stat-num">${mStats.prs.length}</div><div class="stat-lbl">New PRs</div></div>
    </div>`;
  if(mStats.topExercises.length>0){
    html+=`<div style="margin-top:14px"><div style="font-size:10px;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">TOP EXERCISES (BY SETS)</div>`;
    mStats.topExercises.forEach(([exName,sets])=>{
      html+=`<div class="row" style="padding:4px 0;font-size:12px"><span style="flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">${exName}</span><span style="font-family:var(--mono);color:var(--accent);flex-shrink:0;margin-left:8px">${sets} sets</span></div>`;
    });
    html+=`</div>`;
  }
  if(mStats.prs.length>0){
    html+=`<div style="margin-top:12px"><div style="font-size:10px;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">NEW PRS</div>`;
    mStats.prs.forEach(pr=>{
      const display=pr.isBW?`${pr.value} reps`:`${pr.value} kg`;
      html+=`<div class="row" style="padding:4px 0;font-size:12px"><span style="flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">⭐ ${pr.exName}</span><span style="font-family:var(--mono);color:var(--amber);flex-shrink:0;margin-left:8px">${display}</span></div>`;
    });
    html+=`</div>`;
  }
  if(mStats.workouts===0&&mStats.mobility===0&&mStats.totalSets===0){
    html+=`<div style="margin-top:8px;font-size:12px;color:var(--muted);text-align:center;padding:8px">No activity logged${isCurrentMonth?' yet this month':' in this month'}.</div>`;
  }
  html+=`</div>`;

  // ── Lifetime stat grid ──
  html+=`<div class="section-label">Lifetime</div>`;
  html+=`<div class="stat-grid"><div class="stat-card"><div class="stat-num">${sessComp}</div><div class="stat-lbl">Sessions done</div></div><div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-lbl">Program complete</div></div><div class="stat-card"><div class="stat-num">${totalSets}</div><div class="stat-lbl">Total sets</div></div><div class="stat-card"><div class="stat-num">${mobTotalCompletions}</div><div class="stat-lbl">Mobility sessions</div></div></div>`;
  // Mob streak + history
  html+=`<div class="card" style="margin-bottom:12px"><div class="row" style="margin-bottom:8px"><span style="font-size:14px;font-weight:500">Mobility</span><span class="badge badge-green">🔥 ${mobStreak} day streak</span></div>`;
  if(mobHistory.length>0){html+=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Last ${Math.min(mobHistory.length,8)} completions:</div>`;[...mobHistory].reverse().slice(0,8).forEach(e=>{html+=`<div class="row" style="padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--muted)">${formatDateDisplay(e.date)}</span><span style="font-size:11px;font-family:var(--mono);color:var(--accent);text-align:right">${e.routineName||e.phaseName}</span></div>`;});}else{html+=`<div style="font-size:12px;color:var(--muted)">No full mobility sessions completed yet. Complete all exercises in the Mobility tab to log one.</div>`;}
  html+=`</div>`;

  // Away sessions stat
  if(awaySess>0)html+=`<div class="alert alert-orange" style="margin-bottom:12px">✈ ${awaySess} session${awaySess>1?'s':''} completed in away mode — all count toward your progress.</div>`;

  if(adh!==null)html+=`<div class="card"><div class="row"><span style="font-size:14px;font-weight:500">Weight adherence</span><span class="${adh>=80?'badge badge-green':adh>=60?'badge badge-amber':'badge badge-red'}">${adh}%</span></div><div style="font-size:12px;color:var(--muted);margin:6px 0">Sets within 7% of recommended target weight (gym sessions)</div><div class="prog-track"><div class="prog-fill" style="width:${adh}%;background:${adh>=80?'var(--accent)':adh>=60?'var(--amber)':'var(--red)'}"></div></div></div>`;

  // 1RM + BW ratio
  const bw=getLatestBW();
  html+=`<div class="section-label">Strength profile</div><div class="card">`;
  RM_LIFTS.forEach(l=>{const rm=getRM(l.id);if(!rm){html+=`<div class="row" style="padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${l.name}</span><span style="font-size:12px;color:var(--muted)">Not set</span></div>`;return;}const ratio=bw?rm/bw:null;const lvl=ratio?getStrengthLevel(ratio):null;html+=`<div class="row" style="padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${l.name}</span><div style="text-align:right"><span style="font-size:13px;font-family:var(--mono);color:var(--accent)">${rm} kg</span>${lvl?`<span style="font-size:11px;font-family:var(--mono);color:${lvl.color};margin-left:6px">${ratio.toFixed(2)}×</span>`:''}</div></div>`;});
  if(bw)html+=`<div style="font-size:11px;color:var(--muted);margin-top:8px">Based on bodyweight: ${bw} kg</div>`;
  html+=`</div>`;

  // Bodyweight chart
  html+=`<div class="section-label">Bodyweight (kg)</div>`;
  if(S.bw&&S.bw.length>0){
    const sorted=[...S.bw].sort((a,b)=>a.date.localeCompare(b.date)),vals=sorted.map(b=>b.weight),minW=Math.min(...vals)-1,maxW=Math.max(...vals)+1,range=maxW-minW||1;
    html+=`<div class="card">`;
    if(sorted.length===1){html+=`<div style="text-align:center;padding:16px"><div style="font-size:28px;font-weight:600;font-family:var(--mono)">${vals[0]} kg</div><div style="font-size:12px;color:var(--muted)">${formatDateDisplay(sorted[0].date)}</div></div>`;}
    else{const W=340,H=100,n=sorted.length,pts=sorted.map((b,i)=>`${n>1?(i/(n-1))*(W-20)+10:W/2},${H-((b.weight-minW)/range)*(H-20)-10}`);html+=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto"><polyline points="${pts.join(' ')}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>${sorted.map((b,i)=>{const[x,y]=pts[i].split(',');return`<circle cx="${x}" cy="${y}" r="3" fill="var(--accent)"/>`;}).join('')}<text x="10" y="${H-2}" font-size="9" fill="var(--muted)" font-family="monospace">${formatDateDisplay(sorted[0].date)}</text><text x="${W-10}" y="${H-2}" font-size="9" fill="var(--muted)" font-family="monospace" text-anchor="end">${formatDateDisplay(sorted[sorted.length-1].date)}</text></svg>`;}
    html+=`<div class="divider"></div>`;
    sorted.slice(-5).reverse().forEach((b,i)=>{const prev=sorted[sorted.indexOf(b)-1],diff=prev?(b.weight-prev.weight).toFixed(1):null;html+=`<div class="row" style="padding:5px 0;${i<4?'border-bottom:1px solid var(--border)':''}"><span style="font-size:12px;color:var(--muted)">${formatDateDisplay(b.date)}</span><div style="display:flex;align-items:center;gap:8px">${diff?`<span style="font-size:11px;color:${parseFloat(diff)<0?'var(--accent)':parseFloat(diff)>0?'var(--red)':'var(--muted)'}">${parseFloat(diff)>0?'+':''}${diff}</span>`:''}<span style="font-size:14px;font-weight:500;font-family:var(--mono)">${b.weight} kg</span><button class="btn btn-sm btn-ghost" onclick="deleteBW('${b.date}')" style="color:var(--red);padding:3px 6px">×</button></div></div>`;});
    html+=`</div>`;
  }else{html+=`<div class="card" style="text-align:center;padding:20px"><div style="font-size:13px;color:var(--muted);margin-bottom:10px">No bodyweight entries yet</div><button class="btn btn-sm" onclick="openBWModal()">+ Log weight</button></div>`;}

  // Exercise history + PRs
  const exHistKeys = Object.keys(S.exHistory||{}).filter(k=>(S.exHistory[k]||[]).length>0);
  if(exHistKeys.length>0){
    html+=`<div class="section-label">Personal records</div><div class="card">`;
    let prCount=0;
    exHistKeys.forEach(exName=>{
      const pr=getPR(exName);
      if(!pr||(!pr.bestWeight&&!pr.bestReps)) return;
      if(prCount>=8) return;
      prCount++;
      const isWeighted=pr.bestWeight>0;
      html+=`<div class="row" style="padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${exName}</div><div style="font-size:10px;color:var(--muted)">${formatDateDisplay(pr.date)}</div></div>
        <div style="text-align:right;flex-shrink:0"><span style="font-size:13px;font-family:var(--mono);color:var(--amber)">${isWeighted?pr.bestWeight+' kg × ':''} ${pr.bestReps}r</span></div>
      </div>`;
    });
    html+=`</div>`;

    // Key lifts: volume trend
    const keyLifts=['Barbell Bench Press','Barbell Back Squat','Barbell Deadlift','Wide Grip Pull-Up'];
    const availKeyLifts=keyLifts.filter(n=>S.exHistory[n]&&S.exHistory[n].length>=2);
    if(availKeyLifts.length>0){
      html+=`<div class="section-label">Strength trend (estimated 1RM)</div>`;
      availKeyLifts.forEach(exName=>{
        const hist=[...S.exHistory[exName]].sort((a,b)=>a.date.localeCompare(b.date));
        const pts=hist.map(h=>{
          const best=h.sets.reduce((b,s)=>calcEpley(s.weight||0,s.reps||1)>b?calcEpley(s.weight||0,s.reps||1):b,0);
          return best;
        }).filter(v=>v>0);
        if(pts.length<2) return;
        const minV=Math.min(...pts)*0.9,maxV=Math.max(...pts)*1.02,range=maxV-minV||1;
        const W=340,H=60,n=pts.length;
        const svgPts=pts.map((v,i)=>`${n>1?(i/(n-1))*(W-20)+10:W/2},${H-((v-minV)/range)*(H-10)-5}`).join(' ');
        const trend=pts[pts.length-1]>pts[0];
        html+=`<div class="card" style="margin-bottom:8px">
          <div class="row" style="margin-bottom:6px">
            <span style="font-size:13px;font-weight:500">${exName}</span>
            <span style="font-size:12px;font-family:var(--mono);color:${trend?'var(--accent)':'var(--amber)'}">${trend?'↑':'→'} ${pts[pts.length-1]} kg est.</span>
          </div>
          <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
            <polyline points="${svgPts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
            ${pts.map((v,i)=>{const[x,y]=svgPts.split(' ')[i]?svgPts.split(' ')[i].split(','):['0','0'];return`<circle cx="${x}" cy="${y}" r="3" fill="var(--accent)"/>`;}).join('')}
          </svg>
        </div>`;
      });
    }
  }
  const maxS=Math.max(...Object.values(wkSets),1);
  for(let w=1;w<=16;w++){const bp=Math.round(wkSets[w]/maxS*100);const wlog=S.logs[dayKey(w,0)]||{};const isAw=wlog._awayMode;html+=`<div class="bar-row"><div class="bar-label">Wk ${w}</div><div class="bar-outer"><div class="bar-inner" style="width:${bp}%;${w===16?'background:var(--blue)':isAw?'background:var(--orange)':''}"></div></div><div class="bar-val">${wkSets[w]}${isAw?' ✈':''}</div></div>`;}
  html+=`</div>`;

  // Phase overview
  html+=`<div class="section-label">Phase overview</div><div class="card">`;
  [{label:"Phase 1 — Foundation",sub:"Weeks 1–4",start:1,end:4},{label:"Phase 2 — Volume",sub:"Weeks 5–8",start:5,end:8},{label:"Phase 3 — Hypertrophy",sub:"Weeks 9–12",start:9,end:12},{label:"Phase 4 — Strength Peak",sub:"Weeks 13–15",start:13,end:15},{label:"Deload",sub:"Week 16",start:16,end:16}].forEach((ph,i,arr)=>{
    let phD=0,phT=0;for(let w=ph.start;w<=ph.end;w++)for(let d=0;d<3;d++){phT++;if(isSessionDone(w,d))phD++;}
    const phPct=Math.round(phD/phT*100);
    html+=`<div style="padding:10px 0;${i<arr.length-1?'border-bottom:1px solid var(--border)':''}"><div class="row" style="margin-bottom:6px"><div><div style="font-size:13px;font-weight:500">${ph.label}</div><div style="font-size:11px;color:var(--muted)">${ph.sub}</div></div><span style="font-size:13px;font-family:var(--mono);color:${phD===phT?'var(--accent)':'var(--muted)'}">${phD}/${phT}</span></div><div class="prog-track"><div class="prog-fill" style="width:${phPct}%"></div></div></div>`;
  });
  html+=`</div><div class="divider"></div><button class="btn btn-ghost btn-danger" onclick="if(confirm('Reset ALL data? Cannot be undone.')){localStorage.removeItem('${STORE_KEY}');location.reload()}">Reset all data</button>`;
  document.getElementById('screen-progress').innerHTML=html;
}
function openBWModal(){document.getElementById('bw-date').value=todayStr();document.getElementById('bw-input').value='';document.getElementById('modal-bw').classList.add('open');}
function saveBW(){const w=parseFloat(document.getElementById('bw-input').value),d=document.getElementById('bw-date').value;if(!w||!d){alert('Please enter weight and date');return;}if(!S.bw)S.bw=[];S.bw=S.bw.filter(e=>e.date!==d);S.bw.push({date:d,weight:w});S.bw.sort((a,b)=>a.date.localeCompare(b.date));saveState();closeModal('modal-bw');renderProgress();}
function deleteBW(date){S.bw=(S.bw||[]).filter(e=>e.date!==date);saveState();renderProgress();}

// ─── MOBILITY ─────────────────────────────────────────────────────────────────
let mobPhaseView=-1, mobRoutineView=-1, expandedMob=-1;

function getAutoRoutine() {
  // Suggest routine based on day of week: Mon/Thu=A, Tue/Fri=B, Wed/Sat/Sun=C
  const dow = new Date().getDay();
  if(dow===1||dow===4) return 0; // Mon/Thu → A (lower)
  if(dow===2||dow===5) return 1; // Tue/Fri → B (upper/thoracic)
  return 2; // Wed/Sat/Sun → C (full body flow)
}

function renderMobility(){
  // Phase always follows the current program week — no manual switching
  const n=getNextPendingSession();
  mobPhaseView = n ? phaseFor(n.week) : phaseFor(16);
  if(mobRoutineView===-1){mobRoutineView=getAutoRoutine();}
  const phaseData=MOB_DATA[mobPhaseView];
  const routine=phaseData.routines[mobRoutineView];
  const checks=getMobChecks(mobPhaseView,mobRoutineView);
  const totalItems=routine.items.length;
  const checkedCount=Object.values(checks).filter(Boolean).length;
  const pct=Math.round(checkedCount/totalItems*100);

  let html=`<div class="page-header"><div class="row"><div><div class="page-title">Mobility</div><div class="page-sub">3 rotating routines · mandatory rest days</div></div><span class="badge badge-green">${phaseData.phase}</span></div></div>`;
  html+=`<div class="alert alert-amber" style="margin-bottom:12px">Do a routine on every rest day — non-negotiable for 45+. Three routines rotate through the week so you get variety and full-body coverage. Tap ▼ on any exercise to see instructions.</div>`;

  // Routine tabs A/B/C only — no phase switching
  html+=`<div class="section-label">Today's routine</div><div style="display:flex;gap:8px;margin-bottom:14px">`;
  phaseData.routineLabel.forEach((label,ri)=>{
    const isAuto=ri===getAutoRoutine(), isActive=ri===mobRoutineView;
    html+=`<button style="flex:1;padding:10px 6px;border-radius:var(--r-sm);border:1px solid ${isActive?'var(--accent)':isAuto?'var(--amber)':'var(--border)'};background:${isActive?'var(--accent-dim)':isAuto?'var(--amber-dim)':'transparent'};color:${isActive?'var(--accent)':isAuto?'var(--amber)':'var(--muted)'};cursor:pointer;font-size:12px;font-weight:500;font-family:var(--sans);line-height:1.4;text-align:center" onclick="switchMobRoutine(${ri})">
      <strong>${['A','B','C'][ri]}</strong><br><span style="font-size:10px">${['Lower','Upper+T-spine','Full Flow'][ri]}</span>${isAuto&&!isActive?'<br><span style="font-size:9px;opacity:.7">suggested</span>':''}
    </button>`;
  });
  html+=`</div>`;

  // Routine info + progress ring
  const r2=22,circ=2*Math.PI*r2,dash=circ*(pct/100),gap=circ-dash;
  html+=`<div class="card" style="margin-bottom:14px"><div class="row" style="margin-bottom:6px"><div><div style="font-size:14px;font-weight:500;color:var(--text)">${phaseData.routineLabel[mobRoutineView]}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${routine.focus}</div><div style="font-size:11px;font-family:var(--mono);color:var(--accent);margin-top:3px">${routine.dur} · ${phaseData.routineSuggest[mobRoutineView]}</div></div>
  <svg class="mob-ring" viewBox="0 0 56 56"><circle cx="28" cy="28" r="${r2}" fill="none" stroke="var(--surf2)" stroke-width="5"/><circle cx="28" cy="28" r="${r2}" fill="none" stroke="var(--accent)" stroke-width="5" stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${(circ/4).toFixed(1)}" stroke-linecap="round"/><text x="28" y="33" text-anchor="middle" font-size="12" font-weight="600" font-family="monospace" fill="var(--text)">${pct}%</text></svg></div>
  <div style="font-size:11px;color:var(--muted)">${checkedCount} of ${totalItems} done today</div>
  ${pct===100?`<div class="alert alert-green" style="margin-top:10px;margin-bottom:0">✓ Routine complete — logged!</div>`:''}</div>`;

  // Exercises
  routine.items.forEach((item,i)=>{
    const checked=!!checks[i],expanded=expandedMob===i,ref=EXREF[item.n];
    html+=`<div class="mob-check-card${checked?' checked':''}${expanded?' expanded':''}">
      <div class="mob-check-row" onclick="toggleMobCheck(${i})">
        <div class="mob-checkbox">${checked?'✓':''}</div>
        <div style="flex:1"><div class="mob-check-name">${item.n}${item.isNew?` <span class="badge badge-amber" style="font-size:10px;padding:1px 5px">new</span>`:''}</div><div class="mob-check-meta">${item.sets}×${item.hold}</div></div>
        <button class="help-btn" style="margin-left:0" onclick="event.stopPropagation();toggleMobExpand(${i})">${expanded?'▲':'▼'}</button>
      </div>`;
    if(item.note) html+=`<div style="font-size:12px;color:var(--muted);margin:8px 0 0;padding-top:8px;border-top:1px solid var(--border)">${item.note}</div>`;
    if(expanded&&ref){
      html+=`<div class="mob-detail">`;
      if(ref.steps){html+=`<ol class="mob-steps">`;ref.steps.forEach(s=>html+=`<li><span>${s}</span></li>`);html+=`</ol>`;}
      if(ref.cue) html+=`<div style="font-size:12px;color:var(--accent);background:var(--accent-dim);border-radius:6px;padding:8px;margin-top:8px">💡 ${ref.cue}</div>`;
      if(ref.mistake) html+=`<div style="font-size:12px;color:var(--red);background:var(--red-dim);border-radius:6px;padding:8px;margin-top:6px">⚠ ${ref.mistake}</div>`;
      if(ref.search){const q=encodeURIComponent(ref.search+' how to');html+=`<a href="https://www.youtube.com/results?search_query=${q}" class="ref-link" style="margin-top:8px" target="_blank">▶ Watch on YouTube</a>`;}
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  if(checkedCount<totalItems) html+=`<button class="btn btn-ghost" onclick="clearMobChecks()">Reset today's checklist</button>`;
  html+=`<div style="height:8px"></div>`;
  document.getElementById('screen-mobility').innerHTML=html;
}
function toggleMobCheck(i){setMobCheck(i,!getMobChecks(mobPhaseView,mobRoutineView)[i]);renderMobility();}
function toggleMobExpand(i){expandedMob=expandedMob===i?-1:i;renderMobility();}
function clearMobChecks(){
  S.mobChecks[getMobCheckKey(mobPhaseView,mobRoutineView)]={};
  if(S.mobHistory) S.mobHistory=S.mobHistory.filter(e=>!(e.date===todayStr()&&e.phase===mobPhaseView&&e.routine===mobRoutineView));
  saveState();renderMobility();
}
function switchMobRoutine(i){mobRoutineView=i;expandedMob=-1;renderMobility();}
// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function showScreen(id,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  window.scrollTo(0,0);
  if(id==='today')renderToday();
  if(id==='calendar')renderCalendar();
  if(id==='strength')renderStrength();
  if(id==='progress')renderProgress();
  if(id==='mobility'){mobRoutineView=-1;expandedMob=-1;renderMobility();}
}
function showScreenById(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach((b,i)=>b.classList.toggle('active',['today','calendar','strength','progress','mobility'][i]===id));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='today')renderToday();
  if(id==='calendar')renderCalendar();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if(!S.startDate)initSetup();else renderToday();
</script>
